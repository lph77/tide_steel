<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>Tide &amp; Steel</title>
<style>
  :root{
    --ink:#e8ddc4; --ink-dim:#b8a878; --parch:#1a1410; --parch2:#241a12;
    --panel:#2a1f15; --line:#4a3826; --gold:#d9a441; --gold-bright:#f0c869;
    --red:#c44a3a; --teal:#4a9d9d; --sea:#2d6e7e; --green:#7da45c; --purple:#b08cc4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{touch-action:manipulation}
  html,body{background:var(--parch);color:var(--ink);font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;line-height:1.55}
  .mono{font-family:"SF Mono","Consolas","Courier New",monospace}
  #app{max-width:780px;margin:0 auto;padding:16px 16px 70px}

  header.brand{text-align:center;padding:12px 0 6px;border-bottom:1px solid var(--line);margin-bottom:12px}
  .brand h1{font-size:32px;letter-spacing:6px;font-weight:400;color:var(--gold);text-shadow:0 2px 0 #00000066}
  .brand .sub{font-size:11px;letter-spacing:4px;color:var(--ink-dim);text-transform:uppercase;margin-top:2px}

  .divider{text-align:center;color:var(--line);letter-spacing:2px;margin:12px 0;font-size:12px;user-select:none}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:3px;padding:15px;margin-bottom:12px;box-shadow:inset 0 0 30px #00000040}
  .panel h2{font-size:15px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;font-weight:400}
  .panel h3{font-size:12px;letter-spacing:2px;color:var(--ink-dim);text-transform:uppercase;margin:10px 0 6px;font-weight:400}
  p.narr{margin:8px 0;font-size:16px}
  .quiet{color:var(--ink-dim);font-size:13px}
  .small{font-size:12px}
  .gold{color:var(--gold-bright)} .red{color:var(--red)} .teal{color:var(--teal)} .green{color:var(--green)} .purple{color:var(--purple)}

  .statbar{display:flex;flex-wrap:wrap;gap:5px 12px;font-size:13px;align-items:center;background:var(--parch2);border:1px solid var(--line);padding:8px 12px;border-radius:3px;margin-bottom:6px}
  .statbar .lbl{color:var(--ink-dim);font-size:10px;letter-spacing:1px;text-transform:uppercase}
  .clockbar{display:flex;flex-wrap:wrap;gap:5px 14px;font-size:13px;align-items:center;background:#0d0a07;border:1px solid var(--line);padding:7px 12px;border-radius:3px;margin-bottom:12px}

  .barwrap{background:#000;border:1px solid var(--line);border-radius:2px;height:14px;overflow:hidden;position:relative;min-width:90px;flex:1}
  .barfill{height:100%;transition:width .3s}
  .barfill.stam{background:linear-gradient(90deg,#4a9d9d,#2d6e7e)}
  .barfill.eco{background:linear-gradient(90deg,#d9a441,#b07d20)}
  .barfill.hp{background:linear-gradient(90deg,#7da45c,#5c8a3c)}
  .barfill.ehp{background:linear-gradient(90deg,#c44a3a,#8a2f24)}
  .bartxt{position:absolute;inset:0;text-align:center;font-size:10px;line-height:14px;color:#fff;text-shadow:0 0 3px #000;font-family:"SF Mono",monospace}

  button{font-family:inherit;cursor:pointer;background:var(--parch2);color:var(--ink);border:1px solid var(--line);border-radius:3px;padding:9px 13px;font-size:14px;letter-spacing:.5px;transition:.12s;margin:4px 4px 4px 0;text-align:left;touch-action:manipulation;-webkit-user-select:none;user-select:none}
  button:hover:not(:disabled){background:var(--line);border-color:var(--gold);color:var(--gold-bright)}
  button:disabled{opacity:.38;cursor:not-allowed}
  button.primary{border-color:var(--gold);color:var(--gold-bright)}
  button.danger{border-color:var(--red)} button.danger:hover:not(:disabled){background:#3a1f1a;color:var(--red)}
  button.full{display:block;width:100%}
  .btnrow{display:flex;flex-wrap:wrap;gap:0}
  .cost{font-size:11px;color:var(--ink-dim)}

  table{width:100%;border-collapse:collapse;font-size:13px;margin:4px 0;table-layout:fixed}
  th,td{text-align:left;padding:5px 7px;border-bottom:1px solid var(--line);overflow:hidden;text-overflow:ellipsis}
  th:first-child,td:first-child{width:auto}
  th.num,td.num{width:22%}
  th{color:var(--ink-dim);font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:400}
  td.num{text-align:right;font-family:"SF Mono",monospace}
  th.num{text-align:right}
  .up{color:var(--green)} .down{color:var(--red)}

  .log{background:#0d0a07;border:1px solid var(--line);border-radius:3px;padding:10px 12px;font-size:13px;max-height:160px;overflow-y:auto;margin:10px 0;font-family:"SF Mono",monospace;line-height:1.5}
  .log div{margin:2px 0}
  .log .hit{color:var(--red)} .log .heal{color:var(--green)} .log .sys{color:var(--ink-dim)} .log .crit{color:var(--gold-bright)}

  .chip{display:inline-block;background:var(--parch2);border:1px solid var(--line);border-radius:12px;padding:2px 9px;font-size:11px;letter-spacing:.5px;margin:2px 4px 2px 0;color:var(--ink-dim)}
  .chip.on{border-color:var(--gold);color:var(--gold-bright)}
  .chip.sea{border-color:var(--sea);color:var(--teal)}

  .omen{font-style:italic;color:var(--teal);border-left:2px solid var(--sea);padding:6px 12px;margin:10px 0;font-size:15px}
  .chronicle{border:1px dashed var(--gold);border-radius:3px;padding:11px;margin:9px 0;background:#1f1810}
  .chronicle .tag{font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
  .discovery{border:1px dashed var(--teal);border-radius:3px;padding:11px;margin:9px 0;background:#10191a}
  .discovery .tag{font-size:10px;letter-spacing:2px;color:var(--teal);text-transform:uppercase}

  .legendcard{border:1px solid var(--line);border-radius:3px;padding:9px;margin:7px 0;background:var(--parch2)}
  .legendcard .nm{color:var(--gold-bright);letter-spacing:2px}
  .center{text-align:center}
  input{width:100%;padding:10px;background:var(--parch2);border:1px solid var(--line);color:var(--ink);font-family:inherit;font-size:15px;border-radius:3px}
  @media(max-width:560px){.brand h1{font-size:24px;letter-spacing:3px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
const GAME_VERSION="v1.18";
/* ===================================================================
   TIDE & STEEL  v2
   Data-driven. Expand by editing the arrays below.
   =================================================================== */

/* ---------- GOODS ---------- */
const GOODS = {
  papyrus:"Papyrus", glass:"Glass", grain:"Grain", perfume:"Perfume",
  purple_dye:"Tyrian Purple", silver:"Silver", ivory:"Ivory", wine:"Wine",
  frankincense:"Frankincense", myrrh:"Myrrh", spices:"Spices", incense:"Incense",
  pepper:"Black Pepper", pearls:"Pearls", cardamom:"Cardamom",
  cloves:"Cloves", nutmeg:"Nutmeg", tin:"Tin", camphor:"Camphor",
  silk:"Silk", porcelain:"Porcelain", tea:"Tea",
  amber:"Amber", furs:"Furs", gold_dust:"Gold Dust", coffee:"Coffee",
  horses:"Horses", dates:"Dates", coral:"Coral", saffron:"Saffron",
  cotton:"Cotton", sandalwood:"Sandalwood", lapis:"Lapis Lazuli", salt:"Salt"
};
const BASE_PRICE = {
  papyrus:8, glass:14, grain:5, perfume:22, purple_dye:60, silver:40, ivory:45, wine:12,
  frankincense:35, myrrh:38, spices:26, incense:20, pepper:50, pearls:70, cardamom:30,
  cloves:55, nutmeg:58, tin:18, camphor:42, silk:80, porcelain:65, tea:28,
  amber:48, furs:33, gold_dust:90, coffee:24, horses:55, dates:9, coral:36, saffron:75,
  cotton:16, sandalwood:46, lapis:52, salt:7
};

/* ---------- PORTS (16 real historical hubs) ----------
   neighbours: ids reachable / revealable from here.
   hidden:true  -> not shown until a neighbour is visited.            */
const PORTS = [
  {id:"alexandria", name:"Alexandria", region:"Egypt",
   blurb:"The Pharos lighthouse splits the haze. Grain ships choke the Great Harbour; ink and incense thicken the air.",
   sells:["papyrus","glass","grain","perfume"], wants:["pepper","silk","frankincense","tin"],
   neighbours:["tyre","carthage","berenike","constantinople"], hidden:false,
   chronicle:{title:"The Pharos & the Library", text:"Alexandria's lighthouse (c.280 BCE) stood ~100m tall — one of the Seven Wonders. Ships entering the harbour were searched and their books seized to be copied for the great Library."},
   myth:{name:"The Lost Scrolls", text:"Sailors swear a drowned wing of the Library still glows beneath the harbour at night."},
   discoveries:["A faded mosaic shows ships from lands you've never heard named.","A scribe sells you a copied page of a Greek sailing manual — the Periplus.","Beneath a temple floor, an older temple. And beneath that, older still."]},

  {id:"tyre", name:"Tyre", region:"Phoenician Levant",
   blurb:"An island-city of purple and glass, mother of a hundred colonies. The reek of murex vats never leaves the wind.",
   sells:["purple_dye","glass","cedar","wine"].filter(g=>GOODS[g]||g==="cedar"), wants:["grain","papyrus","silver","pearls"],
   neighbours:["alexandria","constantinople","aden"], hidden:true,
   chronicle:{title:"Mother of Carthage", text:"Tyre was the Phoenician metropolis that founded Carthage and seeded the alphabet across the Mediterranean. Alexander besieged it for seven months, building a causeway to the island that survives as a sandbar today."},
   myth:{name:"Melqart's Pillars", text:"The city-god Melqart is said to mark the world's edge with twin pillars of fire."},
   discoveries:["Glassblowers show you a trick of colour found nowhere else.","A merchant traces the purple trade back nine generations of his family."]},

  {id:"carthage", name:"Carthage", region:"North Africa",
   blurb:"Twin harbours ring the war-fleet like a coin. Vats of murex stain the docks a royal, reeking purple.",
   sells:["purple_dye","silver","ivory","wine"], wants:["grain","silk","glass","pearls"],
   neighbours:["alexandria","venice","kilwa"], hidden:true,
   chronicle:{title:"Tyrian Purple & Queen Dido", text:"Carthaginian purple came from murex snails — thousands per gram of dye, worth more than its weight in silver. Legend says Queen Dido bought all the land an oxhide could cover, then cut the hide into thin strips to ring a whole hill."},
   myth:{name:"Tanit's Tribute", text:"The goddess Tanit calms storms for captains who pour wine to the sea."},
   discoveries:["A child shows you the tophet, where the city keeps its oldest vows.","You find Roman and Punic coins fused together in a melted purse."]},

  {id:"constantinople", name:"Constantinople", region:"Byzantium",
   blurb:"The city astride two seas. Golden domes, a chain across the harbour, and a market where every tongue is spoken.",
   sells:["silk","saffron","wine","glass"], wants:["furs","amber","spices","gold_dust"],
   neighbours:["alexandria","tyre","venice"], hidden:true,
   chronicle:{title:"The City of the World's Desire", text:"Constantinople guarded the strait between Europe and Asia and the Black Sea grain routes. Byzantine monks famously smuggled silkworm eggs out of China inside hollow canes, breaking China's monopoly on silk."},
   myth:{name:"The Sleepless Walls", text:"They say the triple walls were blessed never to fall to a besieger from the land — only from the sea."},
   discoveries:["A monk hints at how silk's secret was stolen from the East.","Under Hagia Sophia, an engineer explains a dome that should not stand."]},

  {id:"venice", name:"Venice", region:"Adriatic",
   blurb:"A city built on water and on other people's spices. Galleys crowd a lagoon roofed with sails.",
   sells:["glass","salt","coral","wine"], wants:["pepper","cloves","silk","frankincense"],
   neighbours:["carthage","constantinople"], hidden:true,
   chronicle:{title:"The Spice Republic", text:"Venice grew rich as the gateway that sold Eastern spices into Europe at vast markup. Its glassmakers were confined to Murano island — partly to contain fire, partly to guard secrets, on pain of death for leaving."},
   myth:{name:"Marriage to the Sea", text:"Each year the ruler casts a gold ring into the lagoon, wedding the city to the waters."},
   discoveries:["A Murano master shows you mirror-glass clear as still water.","A returned traveller's journal describes a land of paper money in the far East."]},

  {id:"berenike", name:"Berenike", region:"Red Sea",
   blurb:"A furnace-hot Red Sea port where incense caravans meet ships bound for India. The desert hums at dusk.",
   sells:["frankincense","myrrh","incense","dates"], wants:["wine","glass","silver","grain"],
   neighbours:["alexandria","aden"], hidden:true,
   chronicle:{title:"The Incense Road", text:"Berenike linked the Arabian incense roads to Indian Ocean trade. Frankincense and myrrh — tree resins — were burned in temples worldwide and once rivalled gold in value."},
   myth:{name:"The Treasury Djinn", text:"Caravans whisper a djinn guards a treasury carved into rose-red cliffs."},
   discoveries:["A camel-driver teaches you which resin is true and which is faked.","You find an inscription in Tamil — Indian merchants prayed here."]},

  {id:"aden", name:"Aden", region:"Arabia (Yemen)",
   blurb:"A volcanic crater cupping a harbour, the hinge of every monsoon route. Coffee and incense scent the wind.",
   sells:["coffee","frankincense","myrrh","dates"], wants:["cotton","silk","silver","grain"],
   neighbours:["berenike","tyre","hormuz","kilwa","muziris"], hidden:true,
   chronicle:{title:"Gate of Tears", text:"Aden sits on the strait called Bab-el-Mandeb, 'Gate of Tears.' It controlled the monsoon trade between the Red Sea and the Indian Ocean. Coffee first entered world trade through Yemeni ports like this one."},
   myth:{name:"Cain's Grave", text:"Local lore claims the crater was raised over an ancient grave older than memory."},
   discoveries:["A Sufi shares how roasted beans keep him awake to pray.","A pilot reads the monsoon wind like a letter and teaches you the season."]},

  {id:"hormuz", name:"Hormuz", region:"Persian Gulf",
   blurb:"An island of salt and pearls at the Gulf's throat. 'If the world were a ring, Hormuz would be its jewel,' they say.",
   sells:["pearls","horses","salt","saffron"], wants:["spices","silk","grain","ivory"],
   neighbours:["aden","basra","muziris"], hidden:true,
   chronicle:{title:"Jewel of the Gulf", text:"Hormuz controlled the entrance to the Persian Gulf and grew fabulously rich on the pearl fisheries and the trade in fine Arabian horses shipped to India, where war-horses fetched astonishing prices."},
   myth:{name:"The Salt That Weeps", text:"The whole island is salt; they say it weeps brine for a drowned king."},
   discoveries:["A pearl-diver shows you scars from his deepest descent.","A horse-trader explains why Indian kings pay a fortune for Gulf stallions."]},

  {id:"basra", name:"Basra", region:"Mesopotamia",
   blurb:"Where two great rivers braid into canals and palm groves. Sinbad's home port, gateway to Baghdad's markets.",
   sells:["dates","cotton","horses","lapis"], wants:["porcelain","camphor","tin","ivory"],
   neighbours:["hormuz"], hidden:true,
   chronicle:{title:"Port of a Thousand Tales", text:"Basra, founded in the 7th century, was the great port of the Abbasid Caliphate and the launching point for the real voyages that inspired the Sinbad tales. Its canals fed Baghdad, then the largest city on earth."},
   myth:{name:"Sinbad's Rukh", text:"Returning sailors swear to an island that was a sleeping whale, and a bird that blots the sun."},
   discoveries:["A storyteller recounts a voyage that sounds half-true.","An astronomer shows you how to find your latitude by a star."]},

  {id:"muziris", name:"Muziris", region:"India (Malabar)",
   blurb:"Backwaters heavy with pepper drying on mats. Roman gold coins clink in the bazaars.",
   sells:["pepper","cardamom","sandalwood","ivory"], wants:["wine","glass","silver","papyrus"],
   neighbours:["aden","hormuz","kilwa","srivijaya"], hidden:true,
   chronicle:{title:"Black Gold of Malabar", text:"Muziris was the great pepper port of antiquity. Black pepper was so prized in Rome it was called 'black gold' and used to pay rents and ransoms. Hoards of Roman coins across South India prove the scale of this trade."},
   myth:{name:"Garuda's Shadow", text:"Fishermen credit safe passage to Garuda, the divine eagle who scatters sea-serpents."},
   discoveries:["A spice-farmer shows you how pepper vines climb the jackfruit trees.","You buy a palm-leaf manuscript no one in the West can read."]},

  {id:"srivijaya", name:"Srivijaya", region:"Sumatra",
   blurb:"A river-empire of gold and pilgrims, hidden up a jungle estuary. Monks break their journey here to learn Sanskrit.",
   sells:["gold_dust","camphor","sandalwood","spices"], wants:["porcelain","silk","cotton","glass"],
   neighbours:["muziris","malacca","quanzhou"], hidden:true,
   chronicle:{title:"The Golden Khersonese", text:"Srivijaya (centred at Palembang) was a powerful maritime empire that taxed the Strait and was a renowned centre of Buddhist learning — the monk Yijing stopped here to study Sanskrit before continuing to India."},
   myth:{name:"The Naga of the River", text:"A serpent-king is said to coil beneath the estuary, guarding the empire's gold."},
   discoveries:["A monk teaches you a few characters of a sacred script.","A panner shows you river sand that glints with real gold."]},

  {id:"malacca", name:"Malacca", region:"Strait of Malacca",
   blurb:"Every wind of Asia funnels through this strait. Cloves and nutmeg perfume warehouses stacked to the rafters.",
   sells:["cloves","nutmeg","tin","camphor"], wants:["silver","papyrus","glass","wine"],
   neighbours:["srivijaya","quanzhou","guangzhou"], hidden:true,
   chronicle:{title:"The Spice Funnel", text:"Malacca commanded the strait every China–India ship had to pass. Cloves and nutmeg grew only in a few tiny Moluccan islands and were worth fortunes — a handful could buy a house."},
   myth:{name:"The White Mousedeer", text:"A sultan founded the city where a tiny mousedeer bravely kicked his hunting dog into the river — an omen of courage."},
   discoveries:["A harbourmaster shows you the ledger of forty languages traded here.","A trader reveals which 'nutmeg' is really wormwood and ash."]},

  {id:"quanzhou", name:"Quanzhou", region:"Song China",
   blurb:"Marco Polo's 'Zaitun' — a forest of masts, mosques beside pagodas, the greatest port of the East.",
   sells:["porcelain","silk","tea","camphor"], wants:["frankincense","pearls","ivory","coral"],
   neighbours:["srivijaya","malacca","guangzhou"], hidden:true,
   chronicle:{title:"Zaitun, City of Masts", text:"Quanzhou was described by Marco Polo and Ibn Battuta as one of the world's greatest ports. The word 'satin' derives from 'Zaitun.' It held Muslim, Hindu, and Christian communities trading side by side under the Song and Yuan."},
   myth:{name:"The Stone Forest of Anchors", text:"They say a drowned fleet still holds the harbour mouth, anchors turned to coral."},
   discoveries:["A potter shows you the kiln-secret that makes porcelain ring like a bell.","You see a stone tablet carved in four faiths' scripts at once."]},

  {id:"guangzhou", name:"Guangzhou", region:"Tang/Song China",
   blurb:"River-mouth of an empire. Silk, porcelain and tea flow out; the whole world's silver flows in.",
   sells:["silk","porcelain","tea","camphor"], wants:["frankincense","ivory","pepper","pearls"],
   neighbours:["quanzhou","malacca"], hidden:true,
   chronicle:{title:"The Maritime Silk Road", text:"Tang Guangzhou (Canton) hosted thousands of foreign merchants in one of history's first great international trading quarters. The recipe for porcelain wouldn't reach Europe for centuries, making it true 'white gold.'"},
   myth:{name:"Mazu, Goddess of the Sea", text:"Sailors pray to Mazu, a deified girl who calms typhoons and guides lost ships home."},
   discoveries:["A tea-master ranks your palate and is unimpressed.","A clerk explains the world's first printed paper money."]},

  {id:"kilwa", name:"Kilwa", region:"Swahili Coast",
   blurb:"A coral-stone city on an African island, where gold from inland forests meets the monsoon dhows.",
   sells:["gold_dust","ivory","coral","sandalwood"], wants:["porcelain","cotton","glass","silk"],
   neighbours:["aden","carthage","mombasa","muziris"], hidden:true,
   chronicle:{title:"The Gold of Sofala", text:"Kilwa controlled the export of gold from the Great Zimbabwe hinterland and grew so rich it minted its own coins. Its Great Mosque and palace of Husuni Kubwa were among the finest stone buildings in sub-Saharan Africa."},
   myth:{name:"The Coin in the Reef", text:"Divers say the founding sultan threw a coin for every year the city would stand — and they are still finding them."},
   discoveries:["A mason shows you how the whole city is cut from living coral.","A trader weighs gold dust against tiny seeds with uncanny accuracy."]},

  {id:"mombasa", name:"Mombasa", region:"Swahili Coast",
   blurb:"An island harbour of mangrove and coral, last great port before the open ocean and the unknown south.",
   sells:["ivory","coral","sandalwood","coffee"], wants:["cotton","glass","silver","porcelain"],
   neighbours:["kilwa"], hidden:true,
   chronicle:{title:"The Swahili Stone Towns", text:"Mombasa was a key Swahili city-state where Bantu, Arab, and Persian cultures fused into the Swahili language and trade culture. Chinese porcelain shards still litter its old shore — proof of trade reaching all the way to China."},
   myth:{name:"The Spirit of the Mangroves", text:"The mangrove channels are said to hide a guardian that drowns the greedy."},
   discoveries:["A diver brings up a blue-white shard stamped with a dragon.","An elder recites a genealogy that reaches across the whole ocean."]},

  // THE HIDDEN FINAL PORT — appears only when every known port reaches >=80% economy.
  // This is where the father's debt comes due. Not a trade port: a reckoning.
  {id:"lacuna", name:"The Lacuna", region:"No chart names it",
   blurb:"A black harbour beneath a starless sky, where the sea is still as glass. Here waits the man who holds your father's debt — and your fate.",
   sells:[], wants:[], neighbours:[], hidden:true, secret:true, color:"#7a4fb5",
   chronicle:{title:"The Ledger at the End of the World", text:"Every merchant fears the Lacuna — the gap in the map where debts are finally called. Your father sailed here once and came back hollow. Now the ledger bears your name."},
   myth:{name:"The Lacuna Lord", text:"They say he is older than money, and that he has never once forgiven a debt."},
   discoveries:["The water does not move. Your crew will not speak above a whisper."]}
];
/* fix: cedar isn't a defined good; map Tyre's sells cleanly */
PORTS.find(p=>p.id==="tyre").sells=["purple_dye","glass","wine","coral"];

/* ---------- MODERN NAMES + PER-PORT THEME COLOUR ---------- */
const PORT_INFO = {
  alexandria:   {modern:"Alexandria, Egypt",            color:"#d9a441"},  // gold
  tyre:         {modern:"Tyre (Sour), Lebanon",         color:"#9b6bd0"},  // tyrian purple
  carthage:     {modern:"near Tunis, Tunisia",          color:"#c0566e"},  // murex red-purple
  constantinople:{modern:"Istanbul, Türkiye",           color:"#e0c25a"},  // byzantine gold
  venice:       {modern:"Venice, Italy",                color:"#4f9d8e"},  // lagoon teal-green
  berenike:     {modern:"Berenice, Egypt (Red Sea)",    color:"#d98a4a"},  // desert ochre
  aden:         {modern:"Aden, Yemen",                  color:"#c97b54"},  // coffee/terracotta
  hormuz:       {modern:"Hormuz Island, Iran",          color:"#6fb0c4"},  // pearl blue
  basra:        {modern:"Basra, Iraq",                  color:"#7fa86a"},  // date-palm green
  muziris:      {modern:"near Kochi, Kerala, India",    color:"#5fae84"},  // malabar green
  srivijaya:    {modern:"Palembang, Indonesia",         color:"#c9a594"},  // river-gold tan
  malacca:      {modern:"Melaka, Malaysia",             color:"#cf8f5a"},  // spice amber
  quanzhou:     {modern:"Quanzhou, China",              color:"#cf5b4e"},  // imperial red
  guangzhou:    {modern:"Guangzhou, China",             color:"#d98f3c"},  // tang amber-red
  kilwa:        {modern:"Kilwa Kisiwani, Tanzania",     color:"#d8a23e"},  // swahili gold
  mombasa:      {modern:"Mombasa, Kenya",               color:"#5a9fa8"}   // indian-ocean teal
};
function portColor(id){ return (PORT_INFO[id]&&PORT_INFO[id].color)||"#d9a441"; }
function portModern(id){ return (PORT_INFO[id]&&PORT_INFO[id].modern)||""; }


/* ---------- MAP COORDINATES (0-100 grid, x=west→east, y=north→south) ----------
   Roughly geographic so the route-map reads like the real ancient world.       */

  ]
};
/* effective stat = base + sum of purchased tier deltas (s.shipTier[id] = how many refits owned) */
function effShip(s){
  const base=shipById(s.ship);
  const eff=Object.assign({},base);
  const tiers=SHIP_TIERS[s.ship]||[];
  const owned=(s.shipTier&&s.shipTier[s.ship])||0;
  for(let i=0;i<owned && i<tiers.length;i++){
    const d=tiers[i].d;
    for(const k in d){ eff[k]=(eff[k]||0)+d[k]; }
  }
  eff.tierName = owned>0 && tiers[owned-1] ? tiers[owned-1].name : base.name;
  eff.mk = owned+1;                 // Mk I = base
  eff.maxMk = tiers.length+1;
  return eff;
}
function nextTier(s, shipId){
  const tiers=SHIP_TIERS[shipId]||[];
  const owned = (s.shipTier&&s.shipTier[shipId])||0;
  return owned<tiers.length ? {tier:tiers[owned], index:owned} : null;
}

function itemById(id){ return ITEMS.find(i=>i.id===id); }
function ownsItem(s,id){ return s.items && s.items.includes(id); }
/* does the player own an item granting this effect? */
function hasItemEffect(s,eff){ return (s.items||[]).some(id=>{ const it=itemById(id); return it && it.effect===eff; }); }

function rollWorldEvent(s){
  // ~16% chance on a new day, but never two days running
  if(s._lastEventDay===s.day-1) return null;
  if(Math.random()>0.16) return null;
  const total=WORLD_EVENTS.reduce((a,e)=>a+e.weight,0);
  let r=Math.random()*total;
  for(const e of WORLD_EVENTS){ r-=e.weight; if(r<=0) return e; }
  return null;
}

/* ===================================================================
   PERSISTENT WORLD CONDITIONS — linger for weeks, reshape trade & danger.
   Stored on s.conditions = [{type, port|good|portA|portB, until, ...}]
   =================================================================== */
const CONDITION_TYPES = {
  war:      {icon:"⚔", label:"At War",   span:[40,70]},
  plague:   {icon:"☠", label:"Plague",   span:[30,55]},
  boom:     {icon:"🔥", label:"Boom",     span:[30,50]},
  fashion:  {icon:"✨", label:"In Demand",span:[35,50]},
  glut:     {icon:"📉", label:"Glut",     span:[35,50]},
  blockade: {icon:"⛓", label:"Blockaded",span:[20,40]}
};
function activeConditions(s){
  if(!s.conditions) s.conditions=[];
  return s.conditions.filter(c=>c.until>s.day);
}
function portConditions(s,portId){ return activeConditions(s).filter(c=> c.port===portId||c.portA===portId||c.portB===portId ); }
function goodCondition(s,good,type){ return activeConditions(s).find(c=> c.good===good && c.type===type ); }
function routeWarDanger(s,fromId,toId){
  // if either endpoint is at war (esp. with the other), the crossing is perilous
  return activeConditions(s).some(c=> c.type==="war" && ((c.portA===fromId&&c.portB===toId)||(c.portA===toId&&c.portB===fromId)||c.portA===fromId||c.portB===fromId||c.portA===toId||c.portB===toId));
}
function maybeStartCondition(s){
  // ~12% each new day; cap simultaneous conditions so the world isn't chaos
  if(activeConditions(s).length>=3) return null;
  if(Math.random()>0.12) return null;
  const known=PORTS.filter(p=>s.discovered[p.id]);
  if(known.length<2) return null;
  const type=pick(["war","plague","boom","fashion","glut","blockade"]);
  const def=CONDITION_TYPES[type];
  const dur=rint(def.span[0],def.span[1]);
  const until=s.day+dur;
  let cond={type,until}, news="";
  if(type==="war"){
    const a=pick(known); let b=pick(known.filter(p=>p.id!==a.id)); if(!b)return null;
    cond.portA=a.id; cond.portB=b.id;
    news=`${def.icon} War has broken out between ${a.name} and ${b.name}! The waters between them turn deadly, and both crave grain and tin.`;
  } else if(type==="plague"||type==="boom"||type==="blockade"){
    const p=pick(known); cond.port=p.id;
    if(type==="plague"){ s.eco[p.id]=Math.max(0,(s.eco[p.id]||0)-rint(15,30)); news=`${def.icon} Plague sweeps ${p.name}. Its market collapses and trade there is grim.`; }
    if(type==="boom"){ news=`${def.icon} A boom grips ${p.name} — coin flows freely and merchants pay top price for everything.`; }
    if(type==="blockade"){ news=`${def.icon} ${p.name} is blockaded. Trade there is throttled by tolls and inspections until it lifts.`; }
  } else { // fashion / glut on a good
    const g=pick(Object.keys(GOODS)); cond.good=g;
    if(type==="fashion") news=`${def.icon} ${GOODS[g]} is suddenly the rage in every court — its value soars across the seas.`;
    else news=`${def.icon} A glut of ${GOODS[g]} floods the markets — its price crashes everywhere.`;
  }
  s.conditions.push(cond);
  return {cond,news};
}
/* price modifier from active conditions for a given port+good */
function conditionPriceMult(s,portId,good){
  let m=1;
  activeConditions(s).forEach(c=>{
    if(c.type==="boom" && c.port===portId) m*=1.25;
    if(c.type==="plague" && c.port===portId) m*=0.8;
    if(c.type==="blockade" && c.port===portId) m*=0.85;            // throttled trade, worse prices
    if(c.type==="fashion" && c.good===good) m*=1.6;
    if(c.type==="glut" && c.good===good) m*=0.55;
    if(c.type==="war" && (c.portA===portId||c.portB===portId)){
      if(good==="grain"||good==="tin") m*=1.7;                      // war goods spike
      if(good==="silk"||good==="purple_dye"||good==="pearls"||good==="porcelain") m*=0.7; // luxuries crater
    }
  });
  return m;
}

  {id:"luxury", label:"silk-merchant", goods:["silk","porcelain","purple_dye","pearls"], growth:[45,100]},

  {id:"explorer",label:"far-rover",    goods:["ivory","frankincense","gold_dust"], growth:[30,70]}
];
function makeRivals(s){
  const names=[...RIVAL_NAMES]; const specs=[...RIVAL_SPECIALTIES];
  const n=rint(2,3); const rivals=[];
  for(let i=0;i<n;i++){
    const name=names.splice(rint(0,names.length-1),1)[0];
    const spec=specs.length?specs.splice(rint(0,specs.length-1),1)[0]:pick(RIVAL_SPECIALTIES);
    const home=pick(PORTS.filter(p=>!p.hidden).concat(PORTS)).id;
    rivals.push({
      name, spec:spec.id, specLabel:spec.label, goods:spec.goods, aggressive:!!spec.aggressive,
      gold:rint(150,400), skill:0.8+Math.random()*0.6, home,
      growth:spec, port:home, legends:[], lastAction:""
    });
  }
  return rivals;
}

function seedOpeningEra(s){
  const total=OPENING_ERAS.reduce((a,e)=>a+e.weight,0);
  let r=Math.random()*total, era=OPENING_ERAS[0];
  for(const e of OPENING_ERAS){ r-=e.weight; if(r<=0){ era=e; break; } }
  if(!s.conditions) s.conditions=[];
  const cond=era.seed(s);
  if(cond) s.conditions.push(cond);
  // build the headline text, naming specifics where relevant
  let detail=era.text;
  if(cond){
    if(cond.type==="war") detail+=` <span class="red">${portById(cond.portA).name}</span> and <span class="red">${portById(cond.portB).name}</span> are the warring ports.`;
    else if(cond.port) detail+=` The port in question is <span class="gold">${portById(cond.port).name}</span>.`;
    else if(cond.good) detail+=` The good is <span class="teal">${GOODS[cond.good]}</span>.`;
  }
  return {headline:era.headline, text:detail};
}
/* advance rivals one day: grow their wealth, react to world, occasionally corner a market */
function tickRivals(s){
  if(!s.rivals) return null;
  let news=null;
  s.rivals.forEach(r=>{
    // base daily growth, boosted by booms / fashions in their goods, hurt by plague/war at home
    let gain=rint(r.growth.growth[0],r.growth.growth[1])*r.skill*0.5;
    activeConditions(s).forEach(c=>{
      if(c.type==="boom" && c.port===r.port) gain*=1.5;
      if(c.type==="fashion" && r.goods.includes(c.good)) gain*=1.6;
      if(c.type==="glut" && r.goods.includes(c.good)) gain*=0.5;
      if((c.type==="plague"||c.type==="blockade") && c.port===r.port) gain*=0.4;
      if(c.type==="war" && (c.portA===r.port||c.portB===r.port)) gain*= r.aggressive?1.4:0.6;
    });
    r.gold=Math.round(r.gold+gain);
    // occasionally relocate to chase opportunity
    if(Math.random()<0.15){ const boom=activeConditions(s).find(c=>c.type==="boom"); r.port = boom? boom.port : pick(PORTS.filter(p=>s.discovered[p.id]||Math.random()<0.3)).id; }
    // occasionally corner a market at their current port (saturates a good there -> bad prices for player)
    if(Math.random()<0.08 && s.discovered[r.port]){
      const g=pick(r.goods); if(!s.satur)s.satur={};
      const k=r.port+":"+g; const rec=s.satur[k]||{v:0,day:s.day};
      rec.v=Math.max(-0.35,rec.v-0.18); rec.day=s.day; s.satur[k]=rec;   // depress price there
      if(!news) news=`💼 ${r.name} has cornered the ${GOODS[g]} trade in ${portById(r.port)?portById(r.port).name:r.port}. Prices there will be poor for a while.`;
    }
  });
  // check rival legend claims (they can beat you to a title)
  s.rivals.forEach(r=>{
    if(!s._claimedRich && r.gold>=50000 && (s.peakGold||0)<50000){ s._claimedRich=true; r.legends.push("Richest in History"); if(!news) news=`👑 ${r.name} has become the Richest in History — that legend is theirs now, unless you can surpass their fortune.`; }
  });
  return news;
}
function rivalLeaderboard(s){
  const you={name:s.name+" (you)",gold:s.gold,you:true};
  const all=[you,...(s.rivals||[]).map(r=>({name:r.name,gold:r.gold,specLabel:r.specLabel}))];
  all.sort((a,b)=>b.gold-a.gold);
  return all;
}
/* a rival may send trouble at sea (light aggression) */
function rivalAmbushChance(s){
  if(!s.rivals) return 0;
  // only aggressive rivals who are wealthier than you, and rarely
  const threats=s.rivals.filter(r=>r.aggressive && r.gold>s.gold);
  return threats.length? 0.10 : 0;
}

   =================================================================== */
const rint=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[Math.floor(Math.random()*a.length)];
const portById=id=>PORTS.find(p=>p.id===id);
const shipById=id=>SHIPS.find(s=>s.id===id)||(PRESTIGE_SHIP.id===id?PRESTIGE_SHIP:undefined);
function shipCap(s){return effShip(s).cap;}
function cargoCount(s){return Object.values(s.cargo).reduce((a,b)=>a+b,0);}
function cargoSpace(s){return shipCap(s)-cargoCount(s);}
function addCargo(s,g,n){s.cargo[g]=(s.cargo[g]||0)+n;}
function avgCost(s,g){ const q=s.cargo[g]||0; if(q<=0)return 0; return Math.round((s.cargoCost&&s.cargoCost[g]||0)/q); }
function rmCargo(s,g,n){s.cargo[g]=(s.cargo[g]||0)-n; if(s.cargo[g]<=0)delete s.cargo[g];}
function addRep(s,n){s.rep[s.port]=(s.rep[s.port]||0)+n;}
function ageYears(s){return 20+Math.floor(s.day/365);}
function dateStr(s){
  const y=Math.floor(s.day/365)+1;
  const dayOfYear=s.day%365;
  const month=Math.floor(dayOfYear/30)%12;
  const dom=(dayOfYear%30)+1;
  const season=SEASONS[Math.floor(month/3)%4];
  return `${BLOCKS[s.block]} · Day ${dom}, ${MONTHS[month]} · ${season}, Year ${y}`;
}

/* advance time by N blocks; rolls into days; Night→forced sleep handled by caller */
function spendStamina(s,amt){ s.stam-=amt; if(s.stam<0)s.stam=0; }
function advanceBlock(s){
  s.block++;
  if(s.block>=BLOCKS.length){ sleep(s); }
}
function sleep(s){
  s.day++; s.block=0; s.stam=s.maxstam;
  rerollMarket(s);
  s.hp=Math.min(s.maxhp, s.hp+8); // a little rest healing
  // a day that included NO self-improvement lets the body recover; strain bleeds off
  const trainedToday = didToday(s,"spar")||didToday(s,"library")||didToday(s,"pray");
  if(!trainedToday) s.strain=Math.max(0,(s.strain||0)-1);
}
function rerollMarket(s){
  // daily ±swing per good per port (a "today" multiplier layered on the seed)
  s._today={};
  // generated lazily in goodPrice using day as seed component
}

/* deterministic-ish daily fluctuation */
function dailyWobble(s,portId,good){
  // mix day in strongly so prices shift each morning
  let h=(s.day+1)*2654435761>>>0;
  const key=portId+":"+good;
  for(let i=0;i<key.length;i++){h=(h^key.charCodeAt(i))*16777619>>>0;}
  h=(h^(h>>>13))>>>0;
  const r=(h%1000)/1000;            // 0..1 stable for this day
  return 0.8+r*0.4;                 // 0.8 .. 1.2
}
function saturation(s,portId,good,forSelling){
  // read-only price multiplier from the player's recent flooding/draining; decays over days.
  if(!s.satur) return 1.0;
  const rec=s.satur[portId+":"+good];
  if(!rec) return 1.0;
  const daysPassed=s.day-rec.day;
  let off=rec.v*Math.max(0,1-daysPassed*0.08);
  // when SELLING, ignore the upward (buy-driven) part: your own buying must never inflate your
  // resale price (that would allow a same-port flip). Selling-flood discounts still apply.
  if(forSelling && off>0) off=0;
  if(Math.abs(off)<0.005) return 1.0;
  return 1+off;   // off<0 -> cheaper (you flooded by selling); off>0 -> dearer (you drained by buying)
}
function addSaturation(s,portId,good,qty,buying){
  if(!s.satur) s.satur={};
  const k=portId+":"+good;
  // market memory for your NEXT visit/transaction (decays daily). Buying drains supply and
  // lifts the price; selling floods the market and drops it.
  const dir= buying? +1 : -1;
  const per= buying? BUY_SAT_PER : 0.010;
  const rec=s.satur[k]||{v:0,day:s.day};
  const daysPassed=s.day-rec.day; rec.v=rec.v*Math.max(0,1-daysPassed*0.08);
  rec.v=Math.max(-0.35,Math.min(0.35, rec.v + dir*per*qty));
  rec.day=s.day; s.satur[k]=rec;
}
function goodPrice(s,portObj,good,buying){
  let p=BASE_PRICE[good];                          // mid / fair value
  if(portObj.sells.includes(good)) p*=0.6;          // produced here -> cheaper base
  if(portObj.wants.includes(good)) p*=1.7;          // craved here -> dearer base
  const seedKey=portObj.id+":"+good;
  if(s._market[seedKey]===undefined) s._market[seedKey]=0.75+Math.random()*0.6;
  p*=s._market[seedKey];                            // per-run scarcity
  p*=dailyWobble(s,portObj.id,good);                // daily fluctuation
  p*=saturation(s,portObj.id,good);                 // your own market impact (gentle, decays)
  p*=conditionPriceMult(s,portObj.id,good);         // wars, booms, plagues, fashions, gluts

  // --- merchant's margin (spread): buy ABOVE mid, sell BELOW mid ---
  const wit=s.wit||5, rep=s.rep[portObj.id]||0;
  let spread=0.15;
  spread-=Math.min(0.06,(wit-5)*0.012);             // sharp trader, up to -6%
  spread-=Math.min(0.05,rep*0.0025);                // trusted locals, up to -5%
  if(s.perks.includes("silver_tongue")) spread-=0.04;
  if(hasItemEffect(s,"prices")) spread-=0.04;   // Royal Trade Seal
  spread=Math.max(0.03,spread);                     // always some margin
  p*= buying ? (1+spread) : (1-spread);
  return Math.max(1,Math.round(p));
}
/* which goods are visible at a port given economy % */
function visibleGoods(s,p){
  const all=[...new Set([...p.sells,...p.wants])];
  if(!s.visited[p.id]) return [];
  const eco=s.eco[p.id]||0;
  const revealCount=Math.min(all.length, 1+Math.floor(eco/ (100/all.length)) );
  // always show goods you currently hold (so you can sell)
  const held=Object.keys(s.cargo);
  const shown=all.slice(0,revealCount);
  return [...new Set([...shown, ...held.filter(g=>all.includes(g))])];
}
function ecoFull(s,p){return (s.eco[p.id]||0)>=100;}

/* reveal neighbours on arrival/exploration */
function revealNeighbours(s,portId){
  const p=portById(portId); if(!p)return [];
  const newly=[];
  p.neighbours.forEach(nid=>{ if(!s.discovered[nid]){ s.discovered[nid]=true; newly.push(portById(nid).name);} });
  return newly;
}

function rollCompanion(s){
  const names=["Sura","Old Kemes","Nuri","Faiz","Lin","Aada","Tariq","Mei"];
  const roles=["caravan guard","navigator","scout","sellsword"];
  s.companion={name:pick(names),role:pick(roles),bonus:pick(["atk","def","luck"]),loyalty:rint(1,10),revealed:false};
}

function xpToNext(s){return 30+(s.level-1)*25;}
function gainXP(s,n,log){
  s.xp+=n;
  while(s.xp>=xpToNext(s)){
    s.xp-=xpToNext(s); s.level++; s.maxhp+=6; s.hp=s.maxhp;
    if(log)log.push({c:"crit",t:"You reach level "+s.level+"! (HP up)"});
    if(s.level%3===0) TEMP.pendingPerk=true;
  }
}

/* ---- AUTO-SAVE of the active run (persists across browser sessions) ---- */
let _saveTimer=null;
function saveGame(){
  // only save a live, in-progress run (not the title/create screens or a finished life)
  if(!S || !S.alive || SCREEN==="title" || SCREEN==="create" || SCREEN==="end"){ return; }
  // debounce: collapse rapid successive saves into one write
  if(_saveTimer) return;
  _saveTimer=setTimeout(async()=>{
    _saveTimer=null;
    try{
      // don't persist transient combat/travel screens — resume at the port hub instead
      const safeScreen=(SCREEN==="combat"||SCREEN==="travel"||SCREEN==="leads")?"port":SCREEN;
      await window.storage.set("ts2_save", JSON.stringify({v:GAME_VERSION, s:S, screen:safeScreen, tab:S.tab||"market"}));
    }catch(e){}
  },400);
}
async function loadGame(){
  try{
    const r=await window.storage.get("ts2_save");
    if(r&&r.value){ const d=JSON.parse(r.value); if(d&&d.s&&d.s.alive) return d; }
  }catch(e){}
  return null;
}
async function clearSave(){ try{ await window.storage.delete("ts2_save"); }catch(e){} }

/* ===================================================================
   COMBAT
   =================================================================== */
/* ===================================================================
   COMBAT — telegraph & counter. Read the enemy's intent, pick the answer.
   Enemy INTENTS (announced before your turn):
     heavy  ⚔  big hit incoming     -> best answer: Guard (or Feint to disrupt)
     brace  🛡 it shrugs off blows   -> best answer: Feint (breaks guard) ; Strike is wasted
     jab    ↯  fast & weak           -> best answer: Strike freely (safe to attack)
   Landing the right counter builds the enemy's STAGGER; fill it and it loses a turn.
   =================================================================== */
const INTENT = {
  heavy:{icon:"⚔", label:"winding up a heavy blow", hint:"Guard braces against it"},
  brace:{icon:"🛡", label:"raising its guard", hint:"Feint to break it open"},
  jab:{icon:"↯", label:"jabbing quickly", hint:"Strike — safe to press the attack"}
};
function rollIntent(e,strikeStreak){
  // each enemy type weights intents differently
  let w = e.beh==="aggressive" ? {heavy:0.5,jab:0.35,brace:0.15}
        : e.beh==="defensive" ? {brace:0.5,heavy:0.25,jab:0.25}
        : {heavy:0.34,brace:0.33,jab:0.33};                 // tricky = unpredictable
  // a foe reads a one-note fighter: if you keep Striking, it winds up heavies to punish you
  if(strikeStreak>=3){ w={heavy:Math.min(0.7,(w.heavy||0)+0.20), brace:(w.brace||0)*0.7, jab:(w.jab||0)*0.7}; }
  const tot=(w.heavy||0)+(w.brace||0)+(w.jab||0);
  const r=Math.random()*tot; let acc=0;
  for(const k of ["heavy","brace","jab"]){ acc+=w[k]||0; if(r<acc)return k; }
  return "jab";
}
function startCombat(enemy,ctx){
  const e=JSON.parse(JSON.stringify(enemy)); e.maxhp=e.hp;
  e.stagMax = e.finalBoss?5 : e.monster?4:3; e.stag=0; e.staggered=false;   // the Lord is harder to stagger
  e.intent = rollIntent(e);
  TEMP.combat={e,log:[{c:"sys",t:e.intro},{c:"sys",t:"The "+e.name+" is "+INTENT[e.intent].label+"."}],over:false,ctx:ctx||{},untouched:true};
  if(S.companion&&!S.companion.revealed){
    if(S.companion.loyalty<=3&&Math.random()<0.4){S.companion.revealed=true;S.companion.traitor=true;TEMP.combat.log.push({c:"hit",t:S.companion.name+" sneers and sides with the enemy! Betrayed."});}
    else S.companion.revealed=true;
  }
  SCREEN="combat"; render();
}
function shipCombatBonus(s){return effShip(s).combat||0;}
function itemPower(s){ // +combat damage from held war-gear
  let p=0;
  if(hasItemEffect(s,"power")) p+=3;
  if(hasItemEffect(s,"warmaster")) p+=4;
  return p;
}
function baseStrike(s){
  let dmg=rint(4,8)+Math.floor(s.str*0.8)+s.level+shipCombatBonus(s)+itemPower(s);
  if(s.perks.includes("cutthroat"))dmg=Math.round(dmg*1.25);
  return dmg;
}
function addStagger(e,n,C){
  e.stag=Math.min(e.stagMax,e.stag+n);
  if(e.stag>=e.stagMax && !e.staggered){ e.staggered=true; C.log.push({c:"crit",t:e.name+" reels — staggered! Press the advantage."}); }
}
/* STRIKE: solid damage. Great vs jab. Wasted into a brace. Leaves you exposed to a heavy. */
function playerStrike(){
  const C=TEMP.combat,e=C.e,s=S;
  let dmg=baseStrike(s);
  let crit=Math.random()<(0.08+s.luck*0.01+(s.perks.includes("sharp_eye")?0.12:0)+(hasItemEffect(s,"loot")?0.10:0)+(hasItemEffect(s,"crit")?0.10:0));
  let note="";
  if(crit)dmg=Math.round(dmg*2);
  if(C.nextDouble){ dmg=Math.round(dmg*2); C.nextDouble=false; note=" (sharpened!)"; }
  if(s.companion&&!s.companion.traitor&&s.companion.bonus==="atk")dmg+=4;
  if(e.staggered) dmg=Math.round(dmg*1.8);                 // burst a staggered foe
  if(!e.staggered && e.intent==="brace"){ dmg=Math.max(1,Math.round(dmg*0.35)); note=" Its guard soaks most of it!"; }
  else if(e.intent==="jab"){ addStagger(e,1,C); note=" Clean opening."; }
  e.hp-=dmg;
  C.log.push({c:crit?"crit":"hit",t:(crit?"CRITICAL! ":"")+"You strike for "+dmg+"."+note});
  if(e.staggered){ e.staggered=false; e.stag=0; }          // spend the stagger
  if(e.hp<=0)return winCombat();
  C.strikeStreak=(C.strikeStreak||0)+1;                    // mindless striking is read by the foe
  // striking into a heavy wind-up = you get hit hard (you didn't defend)
  enemyTurn({exposed: e.intent==="heavy"});
}
/* FEINT: low damage, but breaks a BRACE wide open and disrupts a HEAVY wind-up. Poor vs jab. */
function playerFeint(){
  const C=TEMP.combat,e=C.e,s=S;
  let dmg=Math.round(baseStrike(s)*0.45);
  let note="";
  if(e.intent==="brace"){ addStagger(e,2,C); dmg=Math.round(dmg*1.4); note=" You slip past the guard!"; }
  else if(e.intent==="heavy"){ addStagger(e,1,C); note=" The feint spoils its wind-up — the heavy blow misses!"; e._disrupted=true; }
  else { note=" It reads the feint; little effect."; }
  if(e.staggered){ dmg=Math.round(dmg*1.8); e.staggered=false; e.stag=0; }
  e.hp-=dmg;
  C.log.push({c:"hit",t:"You feint for "+dmg+"."+note});
  if(e.hp<=0)return winCombat();
  C.strikeStreak=0;
  enemyTurn({disrupted:e._disrupted});
}
/* GUARD: halve incoming. Excellent vs heavy, pointless vs jab. */
function playerGuard(){
  const C=TEMP.combat,e=C.e;
  C.guard=true;
  if(e.intent==="heavy") addStagger(e,1,C);               // bracing a heavy throws it off-balance
  C.log.push({c:"sys",t:"You set your feet and guard."});
  C.strikeStreak=0;
  enemyTurn({guarded:true});
}
function useBattleItem(id){
  const s=S,C=TEMP.combat,e=C.e,it=itemById(id);
  if(!C||C.over||!it||!it.use||!ownsItem(s,id))return;
  // consume it
  s.items=s.items.filter(x=>x!==id); if(s.itemPaid)delete s.itemPaid[id];
  if(it.use==="bigheal"){ const h=45; s.hp=Math.min(s.maxhp,s.hp+h); C.log.push({c:"heal",t:"You down the "+it.name+" — a great wound closes (+"+h+" HP)."}); enemyTurn({}); }
  else if(it.use==="escape"){ C.log.push({c:"sys",t:"You smash the "+it.name+" — under cover of smoke, you slip away clean."}); s.fled=true; TEMP.combat.over=true; render(); setTimeout(()=>afterCombat(C),900); }
  else if(it.use==="nextdouble"){ C.nextDouble=true; C.log.push({c:"crit",t:"You oil your blade — your next strike will bite twice as deep."}); render(); }
  else if(it.use==="burst"){ const d=rint(40,65); e.hp-=d; C.log.push({c:"crit",t:"You hurl the "+it.name+" — fire engulfs your foe for "+d+"!"}); if(e.hp<=0)return winCombat(); enemyTurn({}); }
  else if(it.use==="banish"){ e.stag=e.stagMax; e.staggered=true; C.log.push({c:"crit",t:"The "+it.name+" sears the unholy — it reels, staggered!"}); render(); }
}
function playerItem(){const s=S,C=TEMP.combat,e=C.e;
  if(e.finalBoss){
    if((C.healCount||0)>=3){ C.log.push({c:"sys",t:"There is little respite here — the Lacuna Lord presses you too hard to mend again."}); enemyTurn({}); return; }
    C.healCount=(C.healCount||0)+1;
  }
  let h=22+(s.perks.includes("iron_gut")?16:0)+(hasItemEffect(s,"mend")?12:0);s.hp=Math.min(s.maxhp,s.hp+h);C.log.push({c:"heal",t:"You tend your wounds (+"+h+" HP)."});enemyTurn({});}
function afterCombat(C){
  const ret=C.ctx.returnTo; TEMP.combat=null;
  if(ret==="travel"){ SCREEN="travel"; render(); }
  else if(ret==="arrive"){ arrive(); }
  else { SCREEN="port"; render(); }
}
function playerFlee(){
  const s=S,C=TEMP.combat,e=C.e;
  let chance=0.30 + s.luck*0.025 + (s.perks.includes("sea_legs")?0.15:0) + (effShip(s).crew||0) + (hasItemEffect(s,"flee")?0.20:0);
  if(e.monster) chance-=0.22;
  if(e.staggered) chance+=0.25;                            // easier to slip a reeling foe
  chance=Math.max(0.08,Math.min(0.85,chance));
  if(Math.random()<chance){
    let parting=Math.round(rint(e.atk-3,e.atk)*0.6);
    if(s.companion&&!s.companion.traitor&&s.companion.bonus==="def")parting=Math.max(1,parting-2);
    s.hp-=parting; s.fled=true;
    // fleeing is costly: you fling coin and cargo to buy your escape (20-50% of gold)
    const lost=Math.round(s.gold*(0.20+Math.random()*0.30));
    s.gold-=lost;
    let cmsg="";
    const carried=Object.keys(s.cargo);
    if(carried.length && Math.random()<0.5){ const g=pick(carried); rmCargo(s,g,1); cmsg=" You ditch 1 "+GOODS[g]+" to lighten the run."; }
    C.log.push({c:"hit",t:"You break away — taking "+parting+" damage and losing "+lost+" gold in the scramble."+cmsg});
    if(s.hp<=0)return loseCombat();
    if(TEMP.travel){ TEMP.travel.safePassage=true; }   // shaken off one threat; no second ambush this voyage
    C.over=true;render();
    setTimeout(()=>afterCombat(C),900);
  } else {C.log.push({c:"hit",t:"You can't shake them — no escape!"});enemyTurn({});}
}
function enemyTurn(ctx){
  ctx=ctx||{};
  const C=TEMP.combat,e=C.e,s=S; if(C.over)return;
  // if staggered, the enemy loses its turn and recovers
  if(e.staggered){
    C.log.push({c:"sys",t:e.name+" is reeling and cannot strike!"});
    e.staggered=false; e.stag=0;
    e.intent=rollIntent(e,TEMP.combat.strikeStreak);
    C.log.push({c:"sys",t:"It recovers — now "+INTENT[e.intent].label+"."});
    if(s.hp<=0)return loseCombat(); render(); return;
  }
  // a disrupted heavy whiffs entirely
  if(ctx.disrupted || e._disrupted){ e._disrupted=false; C.log.push({c:"heal",t:e.name+"'s heavy blow goes wide!"});
    e.intent=rollIntent(e,TEMP.combat.strikeStreak); C.log.push({c:"sys",t:"It readies again — "+INTENT[e.intent].label+"."}); render(); return; }

  // resolve damage based on the intent the player just responded to
  let dmg;
  if(e.intent==="heavy") dmg=rint(e.atk+3,e.atk+9);
  else if(e.intent==="jab") dmg=rint(Math.max(1,e.atk-6),Math.max(2,e.atk-2));
  else dmg=rint(Math.max(1,e.atk-3),e.atk+2);             // brace: it counter-attacks
  // defensive enemies sometimes mend when bracing
  if(e.intent==="brace"&&Math.random()<0.3){e.hp=Math.min(e.maxhp,e.hp+5);C.log.push({c:"sys",t:e.name+" mends 5 HP."});}

  if(ctx.guarded||C.guard){
    // a correct Guard greatly blunts the blow (the Lacuna Lord still pierces it somewhat)
    dmg=Math.round(dmg*(e.finalBoss?0.50:0.25)); C.guard=false;
  }
  else if(ctx.exposed && e.intent==="heavy"){ dmg=Math.round(dmg*1.9); C.log.push({c:"hit",t:"Caught mid-swing — the heavy blow lands clean!"}); }
  if(s.companion&&!s.companion.traitor&&s.companion.bonus==="def")dmg=Math.max(1,dmg-3);
  if(s.companion&&s.companion.traitor)dmg+=4;
  let armor=(effShip(s).armor||0)+(hasItemEffect(s,"armor")?4:0)+(hasItemEffect(s,"warmaster")?3:0);     // hull + Damascus Cuirass + banner
  if(e.finalBoss) armor=Math.round(armor*0.7);                         // his blade of folded night bites through plate
  if(armor) dmg=Math.max(1,dmg-armor);
  dmg=Math.max(0,dmg);
  s.hp-=dmg;
  if(dmg>0) C.untouched=false;
  C.log.push({c:"hit",t:e.name+" "+(e.intent==="heavy"?"crashes down":e.intent==="jab"?"jabs":"strikes")+" for "+dmg+"."});
  if(s.hp<=0)return loseCombat();
  // choose and announce the NEXT intent
  e.intent=rollIntent(e,TEMP.combat.strikeStreak);
  C.log.push({c:"sys",t:"Next: it is "+INTENT[e.intent].label+"."});
  render();
}
function winCombat(){
  const C=TEMP.combat,e=C.e,s=S;C.over=true;
  if(e.finalBoss){ C.log.push({c:"crit",t:"The Lacuna Lord falls. The debt dies with him."}); render(); setTimeout(()=>{TEMP.combat=null; lacunaResolve(true);},1400); return; }
  let g=rint(e.gold[0],e.gold[1]); if(s.perks.includes("sharp_eye"))g=Math.round(g*1.2); if(hasItemEffect(s,"loot"))g=Math.round(g*1.15); if(hasItemEffect(s,"plunder"))g=Math.round(g*1.3);
  s.gold+=g;s.peakGold=Math.max(s.peakGold,s.gold);s.fights++;
  if(C.untouched) s.perfectKills=(s.perfectKills||0)+1;
  if(e.monster) s.monsterKills=(s.monsterKills||0)+1;
  if(e.legend){
    s.legendKills=(s.legendKills||0)+1;
    if(e.trophy){ C.log.push({c:"crit",t:"You claim "+e.trophy+" — proof of a deed few will believe."}); }
    C.log.push({c:"crit",t:"✦ You have slain a legend of the seas. Sailors will tell this tale for a hundred years. ✦"});
  }
  C.log.push({c:"crit",t:e.name+" falls. You take "+g+" gold."});
  if(e.lacuna)s.lacunaKills++;
  if(e.loot&&cargoSpace(s)>0){addCargo(s,e.loot,1);C.log.push({c:"heal",t:"You loot 1 "+GOODS[e.loot]+"!"});}
  gainXP(s,e.xp,C.log); render();
  setTimeout(()=>{ if(TEMP.pendingPerk){SCREEN="levelup";render();} else {afterCombat(C);} },1200);
}
/* DEFEAT no longer ends the run: you're beaten and robbed, but you live. */
function loseCombat(){
  const C=TEMP.combat,e=C.e,s=S; C.over=true;
  s.everDefeated=true;
  s.hp=1; s.fled=true;  // fled flag bars the "never fled" legend
  if(e.finalBoss){ C.log.push({c:"hit",t:"The Lacuna Lord's blade takes you. The black water rushes up…"}); render(); setTimeout(()=>{TEMP.combat=null; lacunaResolve(false);},1600); return; }
  // beaten in a fight: robbed of 10-20% of gold
  const lost=Math.round(s.gold*(0.10+Math.random()*0.10));
  s.gold-=lost;
  let cargoMsg="";
  const carried=Object.keys(s.cargo);
  if(carried.length && Math.random()<0.5){ const g=pick(carried); rmCargo(s,g,1); cargoMsg=" They also seize 1 "+GOODS[g]+"."; }
  C.log.push({c:"hit",t:"You're beaten down and robbed of "+lost+" gold."+cargoMsg+" You crawl away alive."});
  if(TEMP.travel){ TEMP.travel.safePassage=true; }   // no more attacks this voyage — you're in no state to fight again
  render();
  setTimeout(()=>afterCombat(C),1600);
}

/* ===================================================================
   TRAVEL
   =================================================================== */
function travelTo(id){
  const s=S,dest=portById(id),here=portById(s.port);
  s._collectorsThisStop=false;   // collectors get a fresh attempt at the next port
  let baseDays=rint(45,80);
  const sh=effShip(s);
  let days=Math.round(baseDays/sh.speed);
  if(s.perks.includes("navigator"))days=Math.round(days*0.8);
  if(hasItemEffect(s,"navigate"))days=Math.round(days*0.85);   // Brass Astrolabe
  s.day+=days; s.block=0; s.stam=s.maxstam; rerollMarket(s);
  s.omen=pick(OMENS);

  let danger=0.50; if(s.perks.includes("sea_legs"))danger-=0.18;
  if(hasItemEffect(s,"evade"))danger-=0.10;   // Jewelled Compass
  danger-=(sh.evade||0);   // a sleek hull slips past trouble
  let warNote="";
  if(routeWarDanger(s,s.port,id)){ danger+=0.30; warNote="These waters border a war — far more perilous."; }
  // --- discourage easy A<->B shuttling ---
  let watched=false;
  const routeKey=[s.port,id].sort().join("|");
  if(id===s.lastPort){ danger+=0.25; watched=true; }            // sailing straight back you just came from
  const heat=s.routeHeat[routeKey]||0;
  if(heat>0) danger+=Math.min(0.25,heat*0.08);                  // a route you run often draws predators
  // record this voyage's heat (decays elsewhere), and remember where we left
  s.routeHeat[routeKey]=heat+1;
  // every voyage cools all OTHER routes a little (so occasional trips are fine)
  Object.keys(s.routeHeat).forEach(k=>{ if(k!==routeKey) s.routeHeat[k]=Math.max(0,s.routeHeat[k]-0.5); });
  s.lastPort=s.port;

  // --- world-event modifiers (consumed on use) ---
  let eventNote="";
  if(s._cometLuck){ danger-=0.20; s._cometLuck=false; eventNote="The comet's fortune lightens the seas. "; }
  if(s._prophetEdge){ danger-=0.15; s._prophetEdge=false; eventNote+="The prophet's warning keeps you wary. "; }
  if(s._stormBrewing){ danger+=0.20; s._stormBrewing=false; eventNote+="The brewing storm makes for a rough passage. "; }
  if(s._corsairs){ danger+=0.25; s._corsairs=false; eventNote+="Corsairs prowl these waters. "; }

  danger=Math.max(0.05,Math.min(0.95,danger));
  // --- split the voyage into legs: longer voyages = more legs = more tales & more danger ---
  const legCount=Math.max(1,Math.min(4,Math.round(days/22)));   // ~1 leg per 22 days, capped at 4
  // build a tale for each leg (unique where possible)
  const taleIdx=[...Array(SEA_TALES.length).keys()];
  const tales=[];
  for(let i=0;i<legCount;i++){ if(!taleIdx.length)break; const j=rint(0,taleIdx.length-1); tales.push(taleIdx.splice(j,1)[0]); }
  // a wealthy aggressive rival may send hired pirates after you
  let rivalNote="";
  const rAmbush=rivalAmbushChance(s);
  if(rAmbush>0 && Math.random()<rAmbush){ danger=Math.max(danger,0.99); rivalNote="A rival's hired corsairs have your scent — they mean to slow your rise."; }
  TEMP.travel={dest,days,watched,danger,legCount,leg:0,tales,encounter:Math.random()<danger,eventNote:(eventNote+" "+warNote+" "+rivalNote).trim()};
  if(checkOldAge())return;
  SCREEN="travel"; render();
}
function spawnEncounter(){
  const s=S; s.seaEncounters=(s.seaEncounters||0)+1;
  // LEGENDARY NEMESIS — vanishingly rare (~once per 10 in-game years), only after you've
  // survived a while and never twice close together. The sea's apex predators.
  const daysAlive=s.day||0;
  const sinceLast = s._lastLegendDay===undefined ? 9999 : daysAlive - s._lastLegendDay;
  if(daysAlive>=730 && sinceLast>=1200 && Math.random()<(1/3000)*Math.max(1,s.seaEncounters>0?1:1)){
    s._lastLegendDay=daysAlive;
    let boss=JSON.parse(JSON.stringify(pick(LEGENDS_ENEMY)));
    startCombat(boss,{returnTo:"travel"});
    return;
  }
  let pool=ENEMIES.filter(e=>!e.monster && !e.collector);   // collectors only strike at port, never at sea
  if(s.level>=4&&Math.random()<0.35)pool=ENEMIES.filter(e=>e.monster && !e.collector);
  if(s.lacunaActive&&Math.random()<0.3)pool=[ENEMIES.find(e=>e.lacuna)];
  let enemy=pick(pool);
  if(s.perks.includes("sea_legs")){enemy=JSON.parse(JSON.stringify(enemy));enemy.hp=Math.round(enemy.hp*0.8);}
  startCombat(enemy,{returnTo:"travel"});   // return to the voyage, not straight to port
}
function resolveTravel(){
  // advance one leg of the voyage
  const s=S,T=TEMP.travel;
  T.leg++;
  if(T.leg>T.legCount){ arrive(); return; }
  // once you've been beaten or had to run this voyage, you get safe passage the rest of the way
  if(T.safePassage){ render(); return; }
  // each leg past the first rolls its own encounter (distance = danger)
  const legDanger = T.leg===1 ? 0 : T.danger*0.6;   // first leg used the initial roll already
  if(T.leg===1 && T.encounter){ spawnEncounter(); return; }
  if(T.leg>1 && Math.random()<legDanger){ spawnEncounter(); return; }
  // otherwise just show the leg (tale) — handled by viewTravel
  render();
}
function arrive(){
  const s=S,dest=TEMP.travel.dest;
  s.port=dest.id; const first=!s.visited[dest.id];
  s.visited[dest.id]=true; if(s.eco[dest.id]===undefined)s.eco[dest.id]=0;
  // THE LACUNA — the final reckoning, not a normal landfall
  if(dest.secret){ s.everReachedLacuna=true; SCREEN="lacuna"; render(); return; }
  const newly=revealNeighbours(s,dest.id);
  let bonus=null;
  if(first){
    if(!s.chronicles.includes(dest.id))s.chronicles.push(dest.id);
    // first-footing reward: a new market always pays the curious merchant
    const g=rint(60,140)+s.wit*5;
    s.gold+=g; s.peakGold=Math.max(s.peakGold,s.gold);
    s.eco[dest.id]=Math.min(100,(s.eco[dest.id]||0)+8);   // a modest head start on local economy
    bonus="As the first time you've made port here, local brokers court your custom: <span class='gold'>+"+g+" gold</span>, and you gain a small foothold in the market (economy +8%).";
  }
  // flaunting a luxury treasure as you sail in wins you standing here
  let flaunt=null;
  const lux=(s.items||[]).map(id=>itemById(id)).filter(it=>it&&it.tier==="luxury");
  if(lux.length){
    const it=pick(lux); addRep(s,4);
    flaunt="Word runs ahead of you: the merchant who sails with the <span class='purple'>"+it.name+"</span>. The port's notables take note — your standing here rises.";
  }
  TEMP.arrived={port:dest,first,newly,bonus,flaunt};
  // catch up the bank's monthly accounting for any months that passed at sea,
  // so you get the chance to pay the moment you make landfall — before collectors come
  if(S.bankMonth===undefined) S.bankMonth=monthIndex(S);
  if(monthIndex(S)>S.bankMonth && S.loan>0){
    S.bankMonth=monthIndex(S);
    const due=bankMonthly(S);
    if(due){ TEMP.bankDue=due; TEMP.pendingArrive=true; SCREEN="bankdue"; render(); return; }
  } else if(monthIndex(S)>S.bankMonth){
    S.bankMonth=monthIndex(S); bankMonthly(S);   // deposit interest only
  }
  SCREEN="arrive"; render();
}

/* ===================================================================
   PORT ACTIONS (cost stamina + time)
   =================================================================== */
function canAct(cost){ return S.stam>=cost; }
function doTimeCost(cost){ spendStamina(S,cost); advanceBlock(S); checkOldAge(); }

/* ---- TRADE: quantity + confirm + haggle ---- */
function maxBuyable(s,p,g){
  const price=goodPrice(s,p,g,true);
  if(price<=0)return 0;
  return Math.min(cargoSpace(s), Math.floor(s.gold/price));
}
function confirmTrade(g,mode){ // open the trade panel
  TEMP.trade={good:g,mode,qty:1,haggle:null}; SCREEN="trade"; render();
}
function tradeQty(delta){
  const t=TEMP.trade,s=S,p=portById(s.port);
  const cap = t.mode==="buy" ? Math.max(1,maxBuyable(s,p,t.good)) : (s.cargo[t.good]||0);
  t.qty=Math.max(1,Math.min(cap, t.qty+delta));
  render();
}
function tradeQtyMax(){
  const t=TEMP.trade,s=S,p=portById(s.port);
  t.qty = t.mode==="buy" ? Math.max(1,maxBuyable(s,p,t.good)) : Math.max(1,(s.cargo[t.good]||0));
  render();
}
function tradeHaggle(){
  const t=TEMP.trade,s=S;
  if(t.haggle){flash("You've already made your case.");return;}
  if(didToday(s,"haggle")){flash("You've haggled enough today — push more and you'll be remembered as a nuisance.");return;}
  markToday(s,"haggle");
  // WIT-driven: better odds of a discount, small risk of insult (price worse)
  const witEdge=(s.wit-5);
  const good=0.35+witEdge*0.05;        // chance of a good outcome
  const bad=0.20-witEdge*0.03;         // chance it backfires
  const r=Math.random();
  // haggle is a DIRECT discount on the price (not a fraction of the spread), so a struck deal
  // always saves a real, visible amount regardless of your other trade bonuses.
  if(r<good){ t.haggle={disc:0.12,msg:"They relent — a fine bargain struck (about 12% better)."}; s.hagglesWon=(s.hagglesWon||0)+1; }
  else if(r<good+0.25){ t.haggle={disc:0.06,msg:"A modest concession — about 6% better."}; s.hagglesWon=(s.hagglesWon||0)+1; }
  else if(r>1-Math.max(0.03,bad)){ t.haggle={disc:-0.08,msg:"You overplay it; they take offence — about 8% worse."}; }
  else { t.haggle={disc:0,msg:"They won't budge."}; }
  render();
}
/* how much a purchase of `qty` raises this port's price for your NEXT purchase (market memory) */
const BUY_SAT_PER=0.005;            // each unit bought drains supply ~0.5%, capped
function buyBump(qty){ return Math.min(0.30, qty*BUY_SAT_PER); }
/* one unit's price at this port — reflects WIT, reputation, items, perks (the spread).
   `disc` is a direct haggle discount applied AFTER the spread.
   If `raw` is true, returns the un-rounded value (used to compute an accurate whole total). */
function unitPrice(s,p,good,buying,disc,raw){
  let base=BASE_PRICE[good];
  if(p.sells.includes(good)) base*=0.6;
  if(p.wants.includes(good)) base*=1.7;
  const seedKey=p.id+":"+good;
  if(s._market[seedKey]===undefined) s._market[seedKey]=0.75+Math.random()*0.6;
  base*=s._market[seedKey];
  base*=dailyWobble(s,p.id,good);
  base*=saturation(s,p.id,good,!buying);          // your recent buying/selling here (decays over days)
  base*=conditionPriceMult(s,p.id,good);
  const wit=s.wit||5, rep=s.rep[p.id]||0;
  let spread=0.15;
  spread-=Math.min(0.06,(wit-5)*0.012);           // sharp trader buys cheaper / sells dearer
  spread-=Math.min(0.05,rep*0.0025);              // trusted locals
  if(s.perks.includes("silver_tongue")) spread-=0.04;
  if(hasItemEffect(s,"prices")) spread-=0.10;     // Royal Trade Seal — the strongest single trade boon
  spread=Math.max(0.02,spread);
  base*= buying ? (1+spread) : (1-spread);
  // direct haggle discount: lowers a buy price, raises a sell price
  if(disc){ base*= buying ? (1-disc) : (1+disc); }
  if(raw) return Math.max(0.01, base);
  return Math.max(1,Math.round(base));
}
/* TOTAL for a whole quantity. Discounts (haggle) apply to the WHOLE total, then round once —
   so even cheap goods show a real saving instead of rounding it away per unit. The buy total is
   floored just above the port's best sell total, so an instant same-port flip can't profit. */
function tradeTotal(s,p,t,qty){
  const disc=t.haggle? (t.haggle.disc||0) : 0;
  if(t.mode==="buy"){
    let total=Math.round(unitPrice(s,p,t.good,true,disc,true)*qty);
    // floor: the buy total must stay just above the best sell total (with a full 12% haggle) so a
    // same-port flip can't profit. Use a small proportional margin (+2%) rather than a flat
    // +1/unit, so on cheap goods the floor doesn't swamp a real haggle discount.
    const sellBest=unitPrice(s,p,t.good,false,0.12,true)*qty;
    const floor=Math.ceil(sellBest*1.02)+1;
    total=Math.max(total, floor);
    return Math.max(qty, total);
  } else {
    return Math.max(qty, Math.round(unitPrice(s,p,t.good,false,disc,true)*qty));
  }
}
function executeTrade(){
  const t=TEMP.trade,s=S,p=portById(s.port);
  const qty=t.qty, total=tradeTotal(s,p,t,qty);
  if(!canAct(COST.trade)){flash("Too tired to trade — sleep first.");return;}
  if(!s.cargoCost)s.cargoCost={};
  if(t.mode==="buy"){
    if(cargoSpace(s)<qty){flash("Not enough hold space.");return;}
    if(s.gold<total){flash("Not enough gold.");return;}
    s.gold-=total; addCargo(s,t.good,qty);
    s.cargoCost[t.good]=(s.cargoCost[t.good]||0)+total;   // add to cost basis for this good
    addSaturation(s,p.id,t.good,qty,true);   // buying drains supply -> local price rises
  } else {
    if((s.cargo[t.good]||0)<qty){flash("You don't have that many.");return;}
    const hadBefore=s.cargo[t.good]||0;
    const costBefore=s.cargoCost[t.good]||0;
    const avgCost=hadBefore>0?costBefore/hadBefore:0;
    const profit=Math.round(total - avgCost*qty);          // vs what you paid
    s.gold+=total; s.peakGold=Math.max(s.peakGold,s.gold); rmCargo(s,t.good,qty); gainXP(s,2,null);
    // reduce cost basis proportionally; clear it when the hold empties
    if((s.cargo[t.good]||0)<=0){ delete s.cargoCost[t.good]; }
    else { s.cargoCost[t.good]=Math.max(0, costBefore - avgCost*qty); }
    addSaturation(s,p.id,t.good,qty,false);  // selling floods market -> local price falls
    TEMP.lastProfit=profit;
  }
  bumpEco(s,1.2); spendStamina(s,COST.trade); advanceBlock(s);
  TEMP.trade=null; SCREEN="port"; S.tab="market";
  if(t.mode==="sell"){
    const pf=TEMP.lastProfit;
    flash("Sold "+qty+"× "+GOODS[t.good]+" for "+total+" gold — "+(pf>0?"a profit of "+pf+"g.":pf<0?"a loss of "+Math.abs(pf)+"g.":"breaking even."));
  } else {
    flash("Bought "+qty+"× "+GOODS[t.good]+" for "+total+" gold.");
  }
  checkOldAge(); render();
}
function bumpEco(s,n){
  const id=s.port; const before=s.eco[id]||0;
  if(before>=100) return;
  // diminishing returns: growth slows sharply as the port prospers
  // (full at <40% gives ~full n; the last stretch 80->100 crawls)
  const slow = before<40 ? 1.0 : before<70 ? 0.6 : before<90 ? 0.35 : 0.18;
  let gain = n*slow;
  // daily cap: a single day in port can only lift economy so much, so it takes repeat visits over time
  if(!s.ecoToday) s.ecoToday={};
  const key=id+":"+s.day;
  const todaySoFar=s.ecoToday[key]||0;
  const DAILY_CAP=4;                                   // at most ~4% economy growth per day per port
  if(todaySoFar>=DAILY_CAP) return;                    // tapped out for today — come back tomorrow / another day
  gain=Math.min(gain, DAILY_CAP-todaySoFar);
  s.ecoToday[key]=todaySoFar+gain;
  s.eco[id]=Math.min(100,before+gain);
  if(before<100&&s.eco[id]>=100){ flash(portById(id).name+"'s economy reaches 100% — its full market is open to you!"); }
  checkLacunaUnlock(s);
}
/* ---- THE LACUNA ENDGAME: unlock when every known trade port reaches >=80% economy ---- */
const LACUNA_ECO_TARGET=80;
function tradePorts(){ return PORTS.filter(p=>!p.secret); }   // all real ports (Lacuna excluded)
function ecoProgress(s){
  const ports=tradePorts();
  const ready=ports.filter(p=>(s.eco[p.id]||0)>=LACUNA_ECO_TARGET).length;
  return {ready, total:ports.length, done:ready>=ports.length};
}
function checkLacunaUnlock(s){
  if(s.lacunaUnlocked) return;
  if(ecoProgress(s).done){
    s.lacunaUnlocked=true;
    const lac=PORTS.find(p=>p.id==="lacuna");
    s.discovered.lacuna=true;
    // make it reachable from wherever the player is
    TEMP.lacunaJustOpened=true;
    SCREEN="lacunaOpen"; render();
  }
}
/* Invest gold to boost the current port's economy: 1000g = +1%, capped per day per port */
const INVEST_PER_PCT=1000, INVEST_DAILY_CAP=20;
function investEco(amt){
  const s=S, id=s.port;
  if((s.eco[id]||0)>=100){flash("This market is already at its peak.");return;}
  if(!s.ecoInvestToday) s.ecoInvestToday={};
  const key=id+":"+s.day; const usedToday=s.ecoInvestToday[key]||0;
  let pct=Math.floor(amt/INVEST_PER_PCT);
  pct=Math.min(pct, INVEST_DAILY_CAP-usedToday, 100-(s.eco[id]||0));
  if(pct<=0){ flash(usedToday>=INVEST_DAILY_CAP?"You've invested all you can here today — return another day.":"Not enough gold to invest (1,000g per 1%)."); return; }
  const cost=pct*INVEST_PER_PCT;
  if(s.gold<cost){flash("Not enough gold.");return;}
  s.gold-=cost; s.eco[id]=Math.min(100,(s.eco[id]||0)+pct); s.ecoInvestToday[key]=usedToday+pct;
  flash("You invest "+cost+"g in "+portById(id).name+"'s market — economy +"+pct+"% (now "+s.eco[id]+"%).");
  if((s.eco[id])>=100){} checkLacunaUnlock(s);
  render();
}

/* ---- DAILY-GATED SELF-IMPROVEMENT (no grinding) ---- */
const SPAR_CAP=15;  // soft ceilings; reachable only slowly, one drill per day

/* --- shared slow-growth curve for self-improvement (STR/WIT/LCK) --- */
function statStamCost(base,level){ return base + Math.max(0,(level-5))*6; }      // fitter/wiser = costlier sessions
function statNeeded(level){ return 1 + Math.floor(Math.max(0,(level-5))/2) + 1; } // sessions per +1, rises with level

/* --- overexertion: each session adds strain; pushing while strained risks an incident --- */
const INCIDENTS = {
  spar:    [{t:"You tear a muscle at the post",d:[3,5]},{t:"A bad fall leaves you limping",d:[2,4]},{t:"You crack a rib sparring too hard",d:[4,6]}],
  library: [{t:"You strain your eyes to blur by lamplight",d:[2,4]},{t:"A splitting headache lays you low",d:[2,3]},{t:"You collapse from exhaustion over the scrolls",d:[3,5]}],
  pray:    [{t:"You faint from fasting too long at prayer",d:[2,4]},{t:"You turn an ankle on the temple steps",d:[2,4]},{t:"Days of devotion leave you feverish",d:[3,5]}]
};
function injured(s){ return s.injuredUntil && s.day < s.injuredUntil; }
function injuryDaysLeft(s){ return injured(s)? (s.injuredUntil - s.day) : 0; }
/* probability of an incident rises with accumulated strain and when you train hurt/tired */
function incidentChance(s){
  let c = 0.04 + (s.strain||0)*0.06;                 // each prior same-week session stacks risk
  if(s.hp < s.maxhp*0.4) c += 0.12;                  // training wounded is dangerous
  if(s.stam < 35) c += 0.10;                         // training exhausted too
  if(s.luck>5) c -= Math.min(0.10,(s.luck-5)*0.015); // fortune protects a little
  return Math.max(0.02, Math.min(0.6, c));
}
function rollIncident(s, kind){
  if(Math.random() < incidentChance(s)){
    const inc=pick(INCIDENTS[kind]); const days=rint(inc.d[0],inc.d[1]);
    s.injuredUntil = s.day + days;
    s.everInjured=true;
    s.strain = 0;
    s.hp = Math.max(1, s.hp - rint(4,10));
    TEMP.incident = {text:inc.t, days};
    SCREEN="incident";
    return true;
  }
  return false;
}

function trainSpar(){ // STR via accumulated practice, once/day
  const s=S;
  if(injured(s)){flash("You're still hurt — "+injuryDaysLeft(s)+" day(s) of recovery left. No training.");return;}
  if(didToday(s,"spar")){flash("You've trained hard already today. Rest and spar again tomorrow.");return;}
  if(s.str>=SPAR_CAP){flash("Your strength has reached the peak of training — only real battle hardens you further.");return;}
  const cost=statStamCost(SPAR_STAM,s.str);
  if(!canAct(cost)){flash("This session needs "+cost+" stamina. Rest first.");return;}
  markToday(s,"spar"); spendStamina(s,cost); advanceBlock(s);
  // overexertion check BEFORE the gains — push your luck and you get hurt
  if(rollIncident(s,"spar")){ checkOldAge(); render(); return; }
  s.strain=(s.strain||0)+1;
  s.sparProg=(s.sparProg||0)+1;
  const need=statNeeded(s.str);
  if(s.sparProg>=need){
    s.sparProg=0; s.str+=1;
    flash("Breakthrough! The drilling pays off — Strength rises to "+s.str+".");
  } else {
    const left=need-s.sparProg;
    flash("A hard session at the post ("+s.sparProg+"/"+need+"). "+left+" more day"+(left>1?"s":"")+" to grow stronger.");
  }
  checkOldAge(); render();
}
function readLibrary(){ // WIT via accumulated study, once/day, + a real fact
  const s=S;
  if(injured(s)){flash("You're in no state to study — "+injuryDaysLeft(s)+" day(s) of recovery left.");return;}
  if(didToday(s,"library")){flash("Your eyes are tired — the scrolls can wait until tomorrow.");return;}
  if(s.wit>=SPAR_CAP){flash("You've read all this place can teach — wisdom now comes from the world, not the page.");return;}
  const cost=statStamCost(LIBRARY_STAM,s.wit);
  if(!canAct(cost)){flash("Deep reading needs "+cost+" stamina. Rest first.");return;}
  markToday(s,"library"); spendStamina(s,cost); advanceBlock(s);
  if(rollIncident(s,"library")){ checkOldAge(); render(); return; }
  s.strain=(s.strain||0)+1;
  // always learn a fact; WIT rises only on a study breakthrough
  const unread=LIBRARY_FACTS.map((f,i)=>i).filter(i=>!s.factsRead.includes(i));
  let fact;
  if(unread.length){ const idx=pick(unread); s.factsRead.push(idx); fact=LIBRARY_FACTS[idx]; }
  else fact=pick(LIBRARY_FACTS);
  s.witProg=(s.witProg||0)+1;
  const need=statNeeded(s.wit);
  let witUp=false, progMsg="";
  if(s.witProg>=need){ s.witProg=0; s.wit+=1; witUp=true; }
  else { const left=need-s.witProg; progMsg="Study deepens ("+s.witProg+"/"+need+") — "+left+" more day"+(left>1?"s":"")+" to sharpen your Wit."; }
  TEMP.libfact={fact, witUp, wit:s.wit, progMsg};
  SCREEN="library"; checkOldAge(); render();
}
function prayTemple(){ // LCK via accumulated devotion, once/day
  const s=S;
  if(injured(s)){flash("You're too unwell to make the climb — "+injuryDaysLeft(s)+" day(s) of recovery left.");return;}
  if(didToday(s,"pray")){flash("You've made your devotions today. Return tomorrow.");return;}
  if(s.luck>=SPAR_CAP){flash("Fortune already smiles on you as much as devotion allows.");return;}
  const cost=statStamCost(TEMPLE_STAM,s.luck);
  if(!canAct(cost)){flash("Prayer and fasting need "+cost+" stamina. Rest first.");return;}
  markToday(s,"pray"); spendStamina(s,cost); advanceBlock(s);
  if(rollIncident(s,"pray")){ checkOldAge(); render(); return; }
  s.strain=(s.strain||0)+1;
  s.luckProg=(s.luckProg||0)+1;
  const need=statNeeded(s.luck);
  if(s.luckProg>=need){
    s.luckProg=0; s.luck+=1;
    flash("A sign! Fortune turns to you — Luck rises to "+s.luck+".");
  } else {
    const left=need-s.luckProg;
    flash("You keep vigil ("+s.luckProg+"/"+need+"). "+left+" more day"+(left>1?"s":"")+" of devotion for fortune's favour.");
  }
  checkOldAge(); render();
}
