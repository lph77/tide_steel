function explore(){
  const s=S,p=portById(s.port);
  if(injured(s)){flash("You're in no state to go exploring — "+injuryDaysLeft(s)+" day(s) of recovery left.");return;}
  if(didToday(s,"explore")){flash("You've wandered the city enough for one day.");return;}
  if(!canAct(COST.explore)){flash("Exploring needs "+COST.explore+" stamina. Rest first.");return;}
  // present 3 random leads to choose from
  const remaining=p.discoveries.map((d,i)=>i).filter(i=>!(s.foundDiscoveries[p.id]||[]).includes(i));
  if(!remaining.length){
    // nothing left to discover here — quick flavour, still costs the day
    markToday(s,"explore"); spendStamina(s,COST.explore); advanceBlock(s);
    const newly=revealNeighbours(s,p.id);
    TEMP.discovery={text:"You've walked every street of "+p.name+".", reward:newly.length?("Still, you hear of a new port: "+newly.join(", ")+"."):"The city holds no more secrets for you."};
    SCREEN="discovery"; checkOldAge(); render(); return;
  }
  const pool=[...LEADS]; const chosen=[];
  for(let i=0;i<3 && pool.length;i++){ chosen.push(pool.splice(rint(0,pool.length-1),1)[0]); }
  TEMP.leads=chosen; SCREEN="leads"; render();
}
function statRoll(s,stat){ return (s[stat]||5) + rint(1,12); }   // stat + d12
function pursueLead(idx){
  const s=S,p=portById(s.port),lead=TEMP.leads[idx];
  // commit the day & stamina now
  if(injured(s)){flash("You're hurt — rest first.");return;}
  markToday(s,"explore"); spendStamina(s,COST.explore); advanceBlock(s);
  TEMP.leads=null;

  // resolve
  let success, margin=0;
  if(lead.stat==="pay"){
    if(s.gold<lead.cost){ TEMP.discovery={text:"You haven't the "+lead.cost+" gold the harbourmaster wants. He turns away.",reward:null}; SCREEN="discovery"; checkOldAge(); render(); return; }
    s.gold-=lead.cost; success=true;
  } else {
    const roll=statRoll(s,lead.stat); margin=roll-lead.diff; success=roll>=lead.diff;
  }

  if(success){
    // grant an actual historical discovery + a reward scaled by how well you did
    const remaining=p.discoveries.map((d,i)=>i).filter(i=>!(s.foundDiscoveries[p.id]||[]).includes(i));
    const found=s.foundDiscoveries[p.id]||[];
    let disc="";
    if(remaining.length){ const di=pick(remaining); found.push(di); s.foundDiscoveries[p.id]=found; disc=p.discoveries[di]; }
    const great=margin>=6;
    let reward;
    const g=rint(great?50:25, great?110:60)+Math.round((s[lead.stat==="pay"?"wit":lead.stat]-5)*3);
    if(g>0){ s.gold+=g; s.peakGold=Math.max(s.peakGold,s.gold); reward="You come away "+g+" gold richer."; }
    if(great && cargoSpace(s)>0){ const gd=pick(p.sells); addCargo(s,gd,1); reward+=" And a fine "+GOODS[gd]+" besides!"; }
    bumpEco(s,2);
    TEMP.discovery={text:(lead.win||"You succeed.")+(disc?" "+disc:""), reward, great};
    // fully explored?
    if((s.foundDiscoveries[p.id]||[]).length>=p.discoveries.length && !(s.fullyExplored&&s.fullyExplored[p.id])){
      if(!s.fullyExplored)s.fullyExplored={};
      s.fullyExplored[p.id]=true;
      const gg=rint(120,220); s.gold+=gg; s.peakGold=Math.max(s.peakGold,s.gold);
      s.eco[p.id]=Math.min(100,(s.eco[p.id]||0)+12);
      TEMP.discovery.completed="You now know every corner of "+p.name+". A grateful guild rewards you: <span class='gold'>+"+gg+" gold</span> and standing here (economy +12%).";
    }
    const newly=revealNeighbours(s,p.id);
    if(newly.length) TEMP.discovery.reward=(TEMP.discovery.reward||"")+" You also hear of a new port: "+newly.join(", ")+".";
    SCREEN="discovery"; checkOldAge(); render();
  } else {
    // failure branches: fight / injury / gold loss / dead end
    if(lead.fightOnLose){
      TEMP.failLead=lead;
      // a back-alley ambush — human enemy
      const enemy=pick(ENEMIES.filter(e=>!e.monster && !e.lacuna));
      startCombat(enemy,{returnTo:"port"});
      return;
    }
    if(lead.injureOnLose && rollIncident2(s,lead)){ return; }   // may injure
    let msg=lead.lose||"The lead comes to nothing.";
    if(lead.goldLossOnLose){ const g=Math.min(s.gold,rint(lead.goldLossOnLose[0],lead.goldLossOnLose[1])); s.gold-=g; msg+=" You lose "+g+" gold."; }
    TEMP.discovery={text:msg, reward:null, failed:true};
    SCREEN="discovery"; checkOldAge(); render();
  }
}
/* a lighter injury roll specific to risky leads (climb/dive) */
function rollIncident2(s,lead){
  const chance=0.5 - Math.min(0.25,(s.luck-5)*0.03);   // luck helps avoid the worst
  if(Math.random()<chance){
    const days=rint(2,4); s.injuredUntil=s.day+days; s.everInjured=true; s.hp=Math.max(1,s.hp-rint(4,10));
    TEMP.incident={text:lead.id==="diver"?"The current batters you against the rocks":"You fall hard from the cliffs", days};
    SCREEN="incident"; render(); return true;
  }
  return false;
}

/* ===================================================================
   THE BANKING HOUSE — borrow high, save low, default and pay the price.
   Educational: debt compounds fast; savings grow slowly; defaulting hurts.
   =================================================================== */
/* Simple banking — flat rates; limits grow with each year you survive. */
const LOAN_RATE=0.20;     // 20% per month, compounds
const DEPOSIT_RATE=0.03;  // 3% per month
function bankYears(s){ return Math.floor((s.day||0)/365)+1; }   // year of play, from 1
function loanRate(s){ return LOAN_RATE; }
function depositRate(s){ return DEPOSIT_RATE; }
function loanCap(s){ return 10000*bankYears(s); }     // +10,000 lending per year
function depositCap(s){ return 5000*bankYears(s); }   // +5,000 savings per year
function monthIndex(s){ return Math.floor(s.day/30); }
function borrow(amt){
  const s=S;
  const cap=loanCap(s);
  const room=cap-(s.loan||0);
  if(room<=0){flash("The bank won't lend you more until you repay.");return;}
  amt=Math.min(amt,room);
  s.loan=(s.loan||0)+amt; s.gold+=amt;
  if(s.loanMonth===undefined) s.loanMonth=monthIndex(s);   // start the clock
  flash("Borrowed "+amt+" gold at "+Math.round(loanRate(s)*100)+"% monthly. Spend it well — interest never sleeps.");
  render();
}
function repayLoan(amt){
  const s=S;
  if(!s.loan){flash("You owe the bank nothing.");return;}
  amt=Math.min(amt, s.loan, s.gold);
  if(amt<=0){flash("You haven't the gold to repay that.");return;}
  s.gold-=amt; s.loan-=amt;
  if(s.loan<=0){ s.loan=0; s.inDefault=false; s.loanMonth=undefined; s.missedMonths=0; flash("The loan is cleared. The ledger closes — you are free of the bank."); }
  else { if(s.inDefault){ s.inDefault=false; } s.missedMonths=0; flash("Repaid "+amt+" gold. "+s.loan+" still owed. The collectors stand down — for now."); }
  render();
}
/* collectors grow tougher and more numerous the longer you've defaulted */
function makeCollectors(s){
  const m=s.missedMonths||1;
  const base=ENEMIES.find(e=>e.collector);
  const e=JSON.parse(JSON.stringify(base));
  e.hp=Math.round(base.hp*(1+0.45*(m-1)));        // +45% HP per missed month
  e.atk=Math.round(base.atk*(1+0.25*(m-1)));      // +25% attack per missed month
  e.xp=base.xp+10*(m-1);
  if(m>=2) e.name="The Bank's Enforcers";
  if(m>=4) e.name="The Bank's War-Party";
  if(m>=2) e.intro="More men than last time, and harder of eye. The banking house does not forget a debt — and it does not tire.";
  return e;
}
/* after long default the bank stops fighting and simply SEIZES — no battle to win */
function bankSeize(s){
  // take from gold first, then deposit, until the debt is met or assets run dry
  let taken=0;
  const want=Math.min(s.loan, Math.round(s.loan*0.5)+200);   // they grab a big chunk
  let fromGold=Math.min(s.gold, want); s.gold-=fromGold; taken+=fromGold;
  let need=want-fromGold;
  if(need>0 && s.deposit>0){ const fromDep=Math.min(s.deposit, need); s.deposit-=fromDep; taken+=fromDep; }
  // seized money pays down the loan
  s.loan=Math.max(0, s.loan-taken);
  let cargoMsg="";
  // if still nothing to take, they seize cargo
  if(taken<10){ const carried=Object.keys(s.cargo); if(carried.length){ const g=pick(carried); rmCargo(s,g,1); cargoMsg=" Finding little coin, they haul off 1 "+GOODS[g]+"."; } }
  if(s.loan<=0){ s.loan=0; s.inDefault=false; s.loanMonth=undefined; s.missedMonths=0; }
  return {taken, cargoMsg, cleared:s.loan<=0};
}
function depositGold(amt){
  const s=S;
  const cap=depositCap(s);
  const room=cap-(s.deposit||0);
  if(room<=0){flash("Your deposit is at the bank's cap of "+cap+" gold.");return;}
  amt=Math.min(amt, room, s.gold);
  if(amt<=0){flash("Nothing to deposit.");return;}
  s.gold-=amt; s.deposit=(s.deposit||0)+amt;
  flash("Deposited "+amt+" gold. It earns "+Math.round(depositRate(s)*100)+"% monthly, safe from robbery.");
  render();
}
function withdrawGold(amt){
  const s=S;
  if(!s.deposit){flash("You have nothing on deposit.");return;}
  amt=Math.min(amt, s.deposit);
  s.gold+=amt; s.deposit-=amt;
  flash("Withdrew "+amt+" gold from your deposit.");
  render();
}

/* ===================================================================
   CURIOSITIES & LUXURIES SHOP — per-port stock, refreshes monthly.
   =================================================================== */
const ITEM_RESALE=0.40;   // sell items back at 40% of their listed price
/* deterministic-ish hash so a port's stock is stable within a month but varies by port/month */
function shopHash(portId,month){ let h=month*131+1; for(let i=0;i<portId.length;i++)h=(h*31+portId.charCodeAt(i))>>>0; return h; }
function itemAvailable(s,it){
  if(it.boon) return !(s.boonsTaken&&s.boonsTaken.includes(it.id));   // permanent boons: one-time
  if(it.use) return true;                                            // consumables: always restockable
  return !ownsItem(s,it.id);                                         // gear/luxury: not if already held
}
function shopStock(s,portId){
  const month=Math.floor(s.day/30);
  let seed=shopHash(portId,month);
  const rng=()=>{ seed=(seed*1103515245+12345)>>>0; return seed/4294967296; };
  const pickFrom=(tier,n)=>{
    const pool=ITEMS.filter(i=>i.tier===tier && itemAvailable(s,i));
    const out=[];
    for(let k=0;k<n && pool.length;k++){ const idx=Math.floor(rng()*pool.length); out.push(pool.splice(idx,1)[0]); }
    return out;
  };
  // a richer stall: oddities, gear, a boon, a consumable, a luxury
  const chosen=[...pickFrom("odd",1),...pickFrom("useful",2),...pickFrom("boon",2),...pickFrom("consumable",1),...pickFrom("luxury",1)];
  return chosen.map(it=>{ const lo=it.price[0],hi=it.price[1]; const p=Math.round(lo+(hi-lo)*rng()); return {id:it.id, price:p}; });
}
function buyItem(id){
  const s=S, it=itemById(id);
  if(!it){return;}
  const stock=shopStock(s,s.port); const entry=stock.find(e=>e.id===id);
  const price = entry? entry.price : Math.round((it.price[0]+it.price[1])/2);
  if(s.gold<price){flash("You can't afford the "+it.name+" ("+price+"g).");return;}
  s.gold-=price;
  // PERMANENT BOON — applied at once and consumed (recorded as collected, but not carried)
  if(it.boon){
    const b=it.boon; let parts=[];
    if(b.maxhp){ s.maxhp+=b.maxhp; s.hp+=b.maxhp; parts.push("+"+b.maxhp+" max HP"); }
    if(b.str){ s.str+=b.str; parts.push("+"+b.str+" STR"); }
    if(b.wit){ s.wit+=b.wit; parts.push("+"+b.wit+" WIT"); }
    if(b.luck){ s.luck+=b.luck; parts.push("+"+b.luck+" LCK"); }
    if(!s.boonsTaken)s.boonsTaken=[]; s.boonsTaken.push(id);     // collected, for the set
    s.boonsCount=(s.boonsCount||0)+1;
    flash("You use the "+it.name+" — "+parts.join(", ")+", forever. (Permanent boons are one-time treasures.)");
    render(); return;
  }
  if(!s.items)s.items=[]; s.items.push(id);
  if(!s.itemPaid)s.itemPaid={}; s.itemPaid[id]=price;     // remember what you paid (for resale)
  if(it.tier==="luxury"){ s.luxuriesOwned=(s.luxuriesOwned||0)+1; }
  if(it.effect==="luck"){ s.luck+=1; }   // held fortune charms
  flash("You acquire the "+it.name+(it.tier==="luxury"?". A ruinous, magnificent indulgence.":(it.use?". Use it in your next battle.":(it.effect?". Its benefit is yours while you carry it.":"."))));
  render();
}
function sellItem(id){
  const s=S, it=itemById(id);
  if(!ownsItem(s,id)){return;}
  const paid=(s.itemPaid&&s.itemPaid[id])||Math.round((it.price[0]+it.price[1])/2);
  const back=Math.round(paid*ITEM_RESALE);
  s.gold+=back;
  if(it.effect==="luck"){ s.luck=Math.max(1,s.luck-1); }   // lose the held fortune
  s.items=s.items.filter(x=>x!==id);
  if(s.itemPaid)delete s.itemPaid[id];
  flash("You sell the "+it.name+" for "+back+"g — a fraction of the "+paid+"g you paid. Luxuries never repay their price.");
  render();
}
/* monthly bank tick — called on sleep when the month rolls over.
   Returns a prompt object if a loan payment is due, else null. */
function bankMonthly(s){
  // deposit interest (capped, with a small overflow buffer)
  if(s.deposit>0){ s.deposit=Math.min(depositCap(s)+500, Math.round(s.deposit*(1+depositRate(s)))); }
  if(!s.loan){ return null; }
  // loan compounds at your current (creditworthiness-based) rate
  const interest=Math.round(s.loan*loanRate(s));
  s.loan+=interest;
  return {interest, owed:s.loan};
}
function buyShip(id){
  const s=S,sh=shipById(id);
  if(s.gold<sh.price){flash("Not enough gold for the "+sh.name+".");return;}
  if(cargoCount(s)>effShipFor(s,id).cap){flash("Sell cargo first — the "+sh.name+" can't hold "+cargoCount(s)+".");return;}
  s.gold-=sh.price; s.ship=id;
  if(!s.shipTier)s.shipTier={}; if(s.shipTier[id]===undefined)s.shipTier[id]=0;  // start at Mk I
  flash("You take command of the "+sh.name+"!"); render();
}
function buyPrestige(){
  const s=S, ps=PRESTIGE_SHIP;
  if(s.ship===ps.id){flash("You already command the "+ps.name+".");return;}
  if(s.gold<ps.price){flash("The "+ps.name+" costs "+ps.price+"g. The banking house lends — for a price.");return;}
  if(cargoCount(s)>effShipFor(s,ps.id).cap){flash("Sell cargo first — even a flagship has limits.");return;}
  s.gold-=ps.price; s.ship=ps.id;
  if(!s.shipTier)s.shipTier={}; if(s.shipTier[ps.id]===undefined)s.shipTier[ps.id]=0;
  flash("The "+ps.name+" is yours. The whole harbour stops to watch you take her out.");
  render();
}
/* effective stats for a specific ship id (used for cargo-fit checks before switching) */
function effShipFor(s,id){
  const base=shipById(id); const eff=Object.assign({},base);
  const tiers=SHIP_TIERS[id]||[]; const owned=(s.shipTier&&s.shipTier[id])||0;
  for(let i=0;i<owned && i<tiers.length;i++){ const d=tiers[i].d; for(const k in d) eff[k]=(eff[k]||0)+d[k]; }
  return eff;
}
function upgradeShip(){
  const s=S, id=s.ship, nt=nextTier(s,id);
  if(!nt){flash("This ship is already at its finest.");return;}
  if(s.gold<nt.tier.cost){flash("The refit costs "+nt.tier.cost+" gold.");return;}
  s.gold-=nt.tier.cost;
  if(!s.shipTier)s.shipTier={};
  s.shipTier[id]=(s.shipTier[id]||0)+1;
  flash("Refit complete — your ship is now the "+nt.tier.name+"!");
  render();
}
function doSleep(){
  sleep(S);
  if(checkOldAge())return;
  // monthly banking: when the calendar month rolls over
  if(S.bankMonth===undefined) S.bankMonth=monthIndex(S);
  if(monthIndex(S)>S.bankMonth){
    S.bankMonth=monthIndex(S);
    const due=bankMonthly(S);   // accrues deposit interest + compounds any loan
    if(due){ TEMP.bankDue=due; SCREEN="bankdue"; render(); return; }
  }
  // rivals advance every day (wealth, market-cornering, legend races)
  const rivalNews=tickRivals(S);
  // a one-day world event takes priority for the screen if it fires
  const ev=rollWorldEvent(S);
  if(ev){
    S._lastEventDay=S.day;
    const result=ev.fx(S);
    TEMP.worldEvent={ev,result};
    SCREEN="worldevent"; render(); return;
  }
  // otherwise, maybe a lasting world condition begins
  const cond=maybeStartCondition(S);
  if(cond){
    TEMP.worldNews=cond.news;
    SCREEN="worldnews"; render(); return;
  }
  // otherwise, surface rival news if any
  if(rivalNews){
    TEMP.worldNews=rivalNews;
    SCREEN="worldnews"; render(); return;
  }
  render();
}

function flash(m){TEMP.flash=m;render();setTimeout(()=>{TEMP.flash=null;},1600);}

   =================================================================== */
function checkOldAge(){ if(ageYears(S)>=80){endGame("died peacefully of old age");return true;} return false; }
function determineLegend(s){
  const L=[];
  if(s.peakGold>=50000 && !s._claimedRich)L.push("Richest in History");
  if(s.fragments>=3)L.push("Master of the Map");
  if(s.debtCleared)L.push("The Free Soul");
  if(s.fights>=20&&!s.fled)L.push("The Untouchable");
  if(Object.keys(s.funded).length>=5)L.push("Patron of Ages");
  if(s.chronicles.length>=PORTS.length)L.push("Keeper of Chronicles");
  if(Object.values(s.eco).filter(e=>e>=100).length>=5)L.push("Merchant Prince");
  if(!L.length)L.push("A Footnote in the Ledgers");
  return L;
}
/* ---- UNIQUE TITLE: a signature epithet assembled from HOW this life was lived ---- */
function generateTitle(s){
  // 1) an epithet from the dominant stat / signature behaviour
  const stats={STR:s.str,WIT:s.wit,LCK:s.luck};
  const topStat=Object.keys(stats).reduce((a,b)=>stats[a]>=stats[b]?a:b);
  const epithetsByStat={
    STR:["the Iron-Armed","the Unbroken","the Storm-Breaker","the Bull of the Docks"],
    WIT:["the Cunning","the Sharp-Eyed","the Ledger-Wise","the Far-Sighted"],
    LCK:["the Fortunate","the Sea-Blessed","Fate's Favourite","the Charmed"]
  };
  // override epithet with a more specific one if a behaviour stands out
  let epithet=pick(epithetsByStat[topStat]);
  const ports=Object.keys(s.visited).length;
  const eco100=Object.values(s.eco).filter(e=>e>=100).length;
  const funded=Object.keys(s.funded).length;
  const explored=Object.keys(s.fullyExplored||{}).length;

  // --- RARE HIDDEN TITLES: unusual feats, checked FIRST. Only the first match applies. ---
  let rare=false;
  const RARE=[
    // never caught at sea despite many voyages with the chance of trouble
    {cond:()=> s.seaEncounters===0 && (s.day>=600), name:"the Ghost"},        // crossed a life of seas, never once ambushed
    // won 15+ fights and was never once defeated and never fled
    {cond:()=> s.fights>=15 && !s.everDefeated && !s.fled, name:"the Unconquered"},
    // slew 5+ monsters
    {cond:()=> (s.monsterKills||0)>=5, name:"the Leviathan-Slayer"},
    // 12+ flawless victories (took no damage)
    {cond:()=> (s.perfectKills||0)>=12, name:"the Untouched"},
    // immense wealth
    {cond:()=> s.peakGold>=80000, name:"the Croesus"},
    // saw all 16 ports AND all chronicles AND never injured
    {cond:()=> ports>=PORTS.length && s.chronicles.length>=PORTS.length && !s.everInjured, name:"the Worldwalker"},
    // master haggler
    {cond:()=> (s.hagglesWon||0)>=20, name:"the Silver-Tongued"},
    // every port's economy to 100%
    {cond:()=> eco100>=PORTS.length, name:"the Sea-Emperor"},
    // funded a temple in every port
    {cond:()=> funded>=PORTS.length, name:"the Saint of the Sea"},
    // cleared the debt AND found all map fragments AND never lost a fight
    {cond:()=> s.debtCleared && s.fragments>=3 && !s.everDefeated, name:"the Redeemer"},
    // lived to the very end (old age) having visited every port
    {cond:()=> ageYears(s)>=80 && ports>=PORTS.length, name:"the Eternal Voyager"},
    // out-earned every rival merchant by death
    {cond:()=> s.rivals && s.rivals.length && s.rivals.every(r=>s.gold>=r.gold) && s.peakGold>=8000, name:"the Unrivalled"},
    // owned three or more ultra-luxury treasures across the life
    {cond:()=> (s.luxuriesOwned||0)>=3, name:"the Collector"},
    // slew a legendary nemesis of the seas — a deed few ever achieve
    {cond:()=> (s.legendKills||0)>=1, name:"the Legend-Slayer"}
  ];
  for(const r of RARE){ try{ if(r.cond()){ epithet=r.name; rare=true; break; } }catch(e){} }

  if(!rare){
  if(s.peakGold>=30000) epithet="the Golden";
  else if(s.fragments>=3) epithet="the Map-Breaker";
  else if(s.fights>=25) epithet="the Blood-Soaked";
  else if(explored>=4) epithet="the Curious";
  else if(eco100>=3) epithet="the Market-Maker";
  else if(funded>=4) epithet="the Devout";
  else if(ports>=12) epithet="the Far-Traveller";
  else if(s.fights===0 && ports>=5) epithet="the Peaceful";
  else if(s.fled && s.fights<=3) epithet="the Cautious";
  }

  // 2) a role from the ship you ended on
  const shipTitles={skiff:"the Skiff-Bound",dhow:"the Runner",corbita:"the Hauler",baghlah:"the Wayfarer",galley:"the Corsair-Slayer",junk:"Lord of the Junk"};
  const role=shipTitles[s.ship]||"the Merchant";

  // 3) a home — the port where you spent most effort (most explored / funded / highest eco)
  let homeId=s.port;
  let best=-1;
  PORTS.forEach(p=>{ const score=(s.eco[p.id]||0)+(s.funded[p.id]?40:0)+((s.fullyExplored&&s.fullyExplored[p.id])?30:0); if(score>best){best=score;homeId=p.id;} });
  const home=portById(homeId);

  // assemble: "<Name> <epithet>, <role> of <Home>"
  const full=`${s.name} ${epithet}, ${role} of ${home?home.name:"the Open Sea"}`;
  // a one-line summary of the life
  const yrs=ageYears(s);
  const summary=`${ports} ports sailed · ${s.fights} fights · ${s.chronicles.length}/${PORTS.length} chronicles · peak ${s.peakGold}g`;
  return {full, epithet, role, home:home?home.name:"the Open Sea", summary, topStat, rare};
}
function endGame(cause){
  const s=S;s.alive=false;const L=determineLegend(s);
  const title=generateTitle(s);
  TEMP.endinfo={cause,legends:L,title};
  saveLegend({name:s.name,age:ageYears(s),gold:s.peakGold,legend:L[0],title:title.full,rare:title.rare,cause,chronicles:s.chronicles.length,fights:s.fights,ports:Object.keys(s.visited).length,date:Date.now()});
  clearSave();   // the life is over; no run to resume
  SCREEN="end";render();
}
/* THE WIN — debt settled, by gold or by blood. Records the run for the Hall of Legends. */
function winGame(how){
  const s=S; s.alive=false; s.won=true; s.debtCleared=true; s.lacunaActive=false;
  const title=generateTitle(s);
  const yearsTaken=ageYears(s)-20;
  const L=determineLegend(s);
  if(!L.includes("Vanquished the Lacuna")) L.unshift("Vanquished the Lacuna");
  TEMP.winInfo={how, yearsTaken, gold:s.gold, title};
  saveLegend({name:s.name,age:ageYears(s),gold:s.gold,legend:"Vanquished the Lacuna ("+how+")",title:title.full,rare:true,cause:"settled the debt and won the game",chronicles:s.chronicles.length,fights:s.fights,ports:Object.keys(s.visited).length,date:Date.now(),won:true});
  clearSave();
  SCREEN="won"; render();
}
/* the Lacuna boss fight resolves to a win or a humbling loss */
function lacunaResolve(playerWon){
  const s=S;
  if(playerWon){ winGame("in blood"); return; }
  // LOSS — he takes the balance of the debt from your cash (50%), reducing what you owe,
  // then casts you back to your origin. Keep losing and you'll pay it off in instalments.
  const take=Math.floor(s.gold*0.5);
  s.gold-=take; s.lacunaDebt=Math.max(0,s.lacunaDebt-take);
  TEMP.lacunaLoss={take, remaining:s.lacunaDebt, paidOff:s.lacunaDebt<=0};
  if(s.lacunaDebt<=0){ // he's been paid in full across your defeats — the debt is settled
    SCREEN="lacunaLoss"; render(); return;
  }
  s.port=s.home||"alexandria";
  SCREEN="lacunaLoss"; render();
}

    if(window.__inputLock){ return; }                 // ignore taps during the brief read-pause
    const act=b.dataset.act;
    // actions that resolve something the player should read before acting again
    const SLOW={buy:1,sell:1,execTrade:1,spar:1,pray:1,library:1,explore:1,pursueLead:1,fund:1,strike:1,feint:1,guard:1,item:1,flee:1,resolveTravel:1};
    ACTIONS[act](b.dataset.arg);
    if(SLOW[act] && SCREEN!=="bankdue"){
      window.__inputLock=true;
      // dim the action buttons briefly as a visual cue
      document.querySelectorAll("#app [data-act]").forEach(x=>x.style.opacity="0.55");

    }
  });
  const lg=app.querySelector(".log"); if(lg)lg.scrollTop=lg.scrollHeight;
  saveGame();
}

  else {

      h+=`<tr style="cursor:pointer" data-act="openSell" data-arg="${g}"><td><a class="link">${GOODS[g]}</a></td><td class="num">${s.cargo[g]}</td><td class="num quiet">${ac>0?ac+'g':'—'}</td><td class="num"><span class="green">${sell}</span>${ac>0?` <span class="small ${margin>=0?'green':'red'}">(${margin>=0?'+':''}${margin})</span>`:''}</td></tr>`;
    });
    h+=`</table>`;
  }
  h+=`</div>`;
  return h;
}

function viewTrade(){
  const s=S,p=portById(s.port),t=TEMP.trade;
  const total=tradeTotal(s,p,t,t.qty);
  const unit=Math.round(total/Math.max(1,t.qty));
  // "list" = the price WITHOUT the haggle (your permanent bonuses like the Seal stay in, since the
  // strikethrough is meant to show what the haggle itself did to this deal). Compared at total level.
  const hadSeal=hasItemEffect(s,"prices");
  const hasHaggle=!!(t.haggle&&t.haggle.disc);
  const savedHag=t.haggle;
  t.haggle=null;
  const listTotal=tradeTotal(s,p,t,t.qty);
  t.haggle=savedHag;
  const discounted = hasHaggle && (t.mode==="buy" ? (total<listTotal) : (total>listTotal));
  const worsened   = hasHaggle && (t.mode==="buy" ? (total>listTotal) : (total<listTotal));   // a backfire
  const saving = Math.abs(listTotal-total);
  const totalCell = (discounted||worsened)
    ? `<span class="quiet" style="text-decoration:line-through">${listTotal}</span> <strong class="${worsened?'red':(t.mode==='buy'?'gold':'green')}">${total} g</strong>`
    : `<strong class="${t.mode==='buy'?'gold':'green'}">${total} g</strong>`;
  const capLabel = t.mode==="buy" ? `Max you can buy: ${maxBuyable(s,p,t.good)} (hold space ${cargoSpace(s)}, gold ${s.gold})` : `You own: ${s.cargo[t.good]||0}`;
  return `<div class="panel"><h2>${t.mode==="buy"?"Buy":"Sell"} · ${GOODS[t.good]}</h2>
    <p class="quiet small">${capLabel}</p>
    ${t.haggle?`<div class="omen">${t.haggle.msg}</div>`:''}
    <div style="display:flex;align-items:center;gap:8px;margin:12px 0">
      <button data-act="qtyMinus" style="font-size:18px;padding:6px 16px">−</button>
      <span class="mono" style="font-size:22px;min-width:48px;text-align:center">${t.qty}</span>
      <button data-act="qtyPlus" style="font-size:18px;padding:6px 16px">+</button>
      <button data-act="qtyMax">Max</button>
    </div>
    <table>
      <tr><td>Price per unit</td><td class="num"><span class="${t.mode==='buy'?'gold':'green'}">${unit} g</span></td></tr>
      ${t.mode==='sell' && (s.cargo[t.good]||0)>0 && avgCost(s,t.good)>0 ? (()=>{ const ac=avgCost(s,t.good); const pp=unit-ac; return `<tr><td>Avg. you paid</td><td class="num"><span class="quiet">${ac} g</span></td></tr><tr><td>Profit per unit</td><td class="num"><span class="${pp>=0?'green':'red'}">${pp>=0?'+':''}${pp} g</span></td></tr>`; })() : ''}
      <tr><td><strong>Total (×${t.qty})</strong></td><td class="num">${totalCell}</td></tr>
    </table>
    ${discounted?`<p class="cost" style="color:var(--green)">Your haggle paid off — you ${t.mode==='buy'?'save':'gain'} ${saving}g on this deal.</p>`
      :worsened?`<p class="cost" style="color:var(--red)">The haggle soured the deal — it costs you ${saving}g more than before you spoke up.</p>`
      :(hasHaggle&&t.haggle.disc>0?`<p class="cost">This good is already priced near the floor here, so the bargain can't lower it further — your haggling pays off more on pricier wares and on sales.</p>`:'')}
    <p class="cost">${t.mode==='buy'?'Your price reflects your wit, standing and tools. Buying drains the local supply, so it will cost a little more next time you buy here.':'You sell for less than the buy price — profit comes from carrying goods to a port that craves them.'}</p>
    <div class="btnrow" style="margin-top:10px">
      <button data-act="haggle" ${(t.haggle||didToday(s,'haggle'))?'disabled':''}>Haggle <span class="cost">${didToday(s,'haggle')?'(once/day used)':'(WIT '+s.wit+' · risk &amp; reward)'}</span></button>
    </div>
    <div class="btnrow" style="margin-top:6px">
      <button class="primary" data-act="execTrade" ${ (t.mode==='buy' ? (s.gold<total||cargoSpace(s)<t.qty) : ((s.cargo[t.good]||0)<t.qty)) ?'disabled':''}>Confirm ${t.mode}</button>
      <button data-act="cancelTrade">Cancel</button>
    </div>
    <p class="cost">Confirming costs ${COST.trade} stamina and advances time.</p></div>`;
}

function viewBank(){
  const s=S,p=portById(s.port);
  const loan=s.loan||0, dep=s.deposit||0;
  const lr=loanRate(s), dr=depositRate(s), lcap=loanCap(s), dcap=depositCap(s);
  const monthlyInt=Math.round(loan*lr);
  let h=`<div class="panel"><h2>Banking House · ${p.name}</h2>
    <p class="quiet small">Banking houses — from the Knights Templar to the merchant banks of Florence to the <em>hawala</em> brokers of the Indian Ocean — financed the trade that built the world. They also knew the iron law of interest.</p>
    <div class="legendcard">
      <span class="small">Your purse: <span class="gold">${s.gold}g</span></span><br>
      <span class="small">On deposit: <span class="teal">${dep}g</span> / ${dcap} cap · earns <span class="green">${Math.round(dr*100)}%</span>/month</span><br>
      <span class="small">Loan owed: <span class="${loan?'red':'quiet'}">${loan}g</span>${loan?` · grows <span class="red">${Math.round(lr*100)}%</span>/month (~${monthlyInt}g)`:''}</span>
      ${s.inDefault?`<br><span class="red small">⚠ In default — collectors hunt you at every port until you repay.</span>`:''}
    </div>`;
  // CONFIRMATION PROMPT — when an action is pending, ask before it goes through
  const C=TEMP.bankConfirm;
  if(C){
    const labels={borrow:"Borrow",repay:"Repay",deposit:"Deposit",withdraw:"Withdraw"};
    const lines={
      borrow:`Borrow <span class="gold">${C.amt}g</span> at ${Math.round(lr*100)}%/month. Your debt will grow until repaid.`,
      repay:`Repay <span class="gold">${Math.min(C.amt,loan,s.gold)}g</span> toward your ${loan}g loan.`,
      deposit:`Deposit <span class="gold">${Math.min(C.amt,s.gold,dcap-dep)}g</span> into savings (earns ${Math.round(dr*100)}%/month, safe from robbery).`,
      withdraw:`Withdraw <span class="gold">${Math.min(C.amt,dep)}g</span> from your deposit back into your purse.`
    };
    h+=`<div class="panel" style="border:2px solid var(--gold)">
      <h3 style="margin:0 0 6px;color:var(--gold-bright)">Confirm — ${labels[C.op]}</h3>
      <p class="narr small">${lines[C.op]}</p>
      <div class="btnrow">
        <button class="primary" data-act="bankDo">Yes, ${labels[C.op].toLowerCase()}</button>
        <button data-act="bankCancel">Cancel</button>
      </div></div>
      <button class="full" data-act="backPort">Leave the bank</button></div>`;
    return h;
  }
  // Borrow
  h+=`<div class="panel"><h3 style="margin:0 0 6px">Borrow <span class="quiet small">— ${Math.round(lr*100)}%/month, compounds</span></h3>
    <div class="btnrow">
      ${[1000,2500,5000].map(a=>`<button data-act="bankAsk" data-arg="borrow:${a}" ${(loan>=lcap)?'disabled':''}>Borrow ${a}g</button>`).join('')}
    </div>
    <p class="cost">The bank lends up to <span class="gold">${lcap}g</span> at ${Math.round(lr*100)}%/month (your limit rises each year you trade). An unpaid debt doubles in roughly ${Math.ceil(Math.log(2)/Math.log(1+lr))} months.</p></div>`;
  // Repay
  if(loan>0){
    h+=`<div class="panel"><h3 style="margin:0 0 6px">Repay</h3>
      <div class="btnrow">
        <button data-act="bankAsk" data-arg="repay:${monthlyInt}" ${s.gold<1?'disabled':''}>Pay interest (${Math.min(monthlyInt,s.gold)}g)</button>
        <button data-act="bankAsk" data-arg="repay:${Math.ceil(loan/2)}" ${s.gold<1?'disabled':''}>Pay half</button>
        <button data-act="bankAsk" data-arg="repay:${loan}" ${s.gold<loan?'disabled':''}>Pay in full (${loan}g)</button>
      </div>
      <p class="cost">Paying only the interest keeps you in debt forever — the principal never shrinks.</p></div>`;
  }
  // Deposit / withdraw
  h+=`<div class="panel"><h3 style="margin:0 0 6px">Savings <span class="quiet small">— ${Math.round(dr*100)}%/month, safe from robbery, cap ${dcap}g</span></h3>
    <div class="btnrow">
      ${[500,1000,2500].map(a=>`<button data-act="bankAsk" data-arg="deposit:${a}" ${(s.gold<a||(dep>=dcap))?'disabled':''}>Deposit ${a}g</button>`).join('')}
    </div>
    ${dep>0?`<div class="btnrow" style="margin-top:6px">
      <button data-act="bankAsk" data-arg="withdraw:${Math.min(500,dep)}">Withdraw ${Math.min(500,dep)}g</button>
      <button data-act="bankAsk" data-arg="withdraw:${dep}">Withdraw all (${dep}g)</button>
    </div>`:''}
    <p class="cost">Savings grow slowly — far less than a loan costs. That gap is how every bank in history made its fortune.</p></div>`;
  h+=`<button class="full" data-act="backPort">Leave the bank</button></div>`;
  return h;
}

  h+=`<p class="quiet small" style="margin-top:6px">Collection: <span class="gold">${haveCount}</span> / ${totalCollectible} treasures &amp; boons gathered.</p>`;

    h+=`<div class="panel"><h3 style="margin:0 0 6px">Your Collection <span class="quiet small">— sell back at ${Math.round(ITEM_RESALE*100)}% of what you paid</span></h3>`;

function viewBankDue(){

  return `<div class="panel" style="border-left:4px solid var(--gold)">

      <span class="small">Next month: <span class="red">+${nextInterest}g</span> → you'll owe <span class="red">${nextOwed}g</span></span><br>
      <span class="small">The month after: <span class="red">+${monthAfter}g</span> → <span class="red">${nextOwed+monthAfter}g</span></span><br>

function seaScene(s,T){
  // SVG sea with a bobbing, forward-easing ship; sky tinted by time of day
  const night = s.block>=3 || s.block===0 && false;
  const dusk = s.block===2;
  const skyTop = night? "#0b1733" : dusk? "#3a2a3a" : "#1b3a4a";
  const skyBot = night? "#13243f" : dusk? "#5a3a32" : "#2d5e6e";
  const prog = T.legCount? (T.leg)/(T.legCount+1) : 0.5;   // 0..1 along the route
  const shipX = 40 + prog*460;                              // moves across as legs progress
  const orb = night
    ? `<circle cx="470" cy="46" r="16" fill="#e8e6d0" opacity="0.9"/><circle cx="464" cy="42" r="13" fill="${skyTop}" opacity="0.5"/>`
    : `<circle cx="470" cy="50" r="22" fill="${dusk?'#f0a050':'#f0d060'}" opacity="0.85"/>`;
  const stars = night ? Array.from({length:14}).map((_,i)=>`<circle cx="${30+i*38}" cy="${20+(i*53%60)}" r="${i%3?0.8:1.4}" fill="#fff" opacity="${0.4+ (i%3)*0.2}"/>`).join("") : "";
  return `<svg viewBox="0 0 560 200" style="width:100%;display:block;border-radius:4px" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${skyTop}"/><stop offset="1" stop-color="${skyBot}"/></linearGradient>
      <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2d6e7e"/><stop offset="1" stop-color="#10303a"/></linearGradient>
    </defs>
    <rect x="0" y="0" width="560" height="130" fill="url(#sky)"/>
    ${stars}${orb}
    <rect x="0" y="120" width="560" height="80" fill="url(#sea)"/>
    <!-- rolling wave bands -->
    <g opacity="0.5">
      <path d="M0,128 Q70,120 140,128 T280,128 T420,128 T560,128 V200 H0 Z" fill="#2f7080">
        <animateTransform attributeName="transform" type="translate" values="0 0; -140 0; 0 0" dur="4s" repeatCount="indefinite"/></path>
    </g>
    <g opacity="0.4">
      <path d="M0,140 Q70,132 140,140 T280,140 T420,140 T560,140 V200 H0 Z" fill="#225862">
        <animateTransform attributeName="transform" type="translate" values="0 0; 140 0; 0 0" dur="6s" repeatCount="indefinite"/></path>
    </g>
    <!-- ship: bobs up/down and rocks; whole group eased across by leg progress -->
    <g transform="translate(${shipX.toFixed(0)},132)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -5; 0 0; 0 4; 0 0" dur="3.2s" repeatCount="indefinite"/>
        <g>
          <animateTransform attributeName="transform" type="rotate" values="-3 0 0; 3 0 0; -3 0 0" dur="3.2s" repeatCount="indefinite"/>
          <!-- hull -->
          <path d="M-26,4 Q0,20 26,4 L20,-2 L-20,-2 Z" fill="#5a3a22" stroke="#3a2614" stroke-width="1"/>
          <!-- mast & sail -->
          <line x1="0" y1="-2" x2="0" y2="-34" stroke="#3a2614" stroke-width="2"/>
          <path d="M2,-32 Q22,-22 2,-8 Z" fill="#e8ddc4" stroke="#b8a878" stroke-width="1"/>
          <path d="M-2,-30 Q-18,-22 -2,-10 Z" fill="#d8cdb4" stroke="#b8a878" stroke-width="1"/>
          <!-- pennant -->
          <path d="M0,-34 l10,3 l-10,3 Z" fill="#c44a3a"/>
        </g>
      </g>
    </g>
  </svg>`;
}
function viewTravel(){

  const tale = (T.tales && T.tales[legNow-1]!==undefined) ? SEA_TALES[T.tales[legNow-1]] : null;
  const done = (T.leg||0)>=total;
  const dots = Array.from({length:total}).map((_,i)=>`<span style="font-size:14px;color:${i<legNow?'var(--gold-bright)':'var(--line)'}">●</span>`).join(" ");
  let h=`<div class="panel"><h2>The Crossing <span class="quiet small">· leg ${legNow} of ${total}</span></h2>

    <div class="center" style="margin:6px 0">${dots}</div>`;
  if((T.leg||0)===0){
    // pre-departure: show omen + watched warning
    if(T.watched) h+=`<p class="red small">You've sailed this stretch recently — others have noticed. The waters feel watched.</p>`;
    if(T.eventNote) h+=`<p class="teal small">${T.eventNote}</p>`;

    h+=`<p class="teal small">Battered from the last encounter, you keep your head down and your sails full. No one troubles you again on this crossing.</p>
      <button class="primary full" data-act="resolveTravel">${done?'Make for harbour':'Limp onward'}</button>`;
  } else if(tale){
    h+=`<div class="discovery"><div class="tag">At Sea</div><p class="narr small">${tale}</p></div>
      <button class="primary full" data-act="resolveTravel">${done?'Make for harbour':'Sail on'}</button>`;

    h+=`<button class="primary full" data-act="resolveTravel">${done?'Make for harbour':'Sail on'}</button>`;
  }
  h+=`</div>`;
  return h;
}

function viewLeads(){
  const s=S,p=portById(s.port);

  const statVal={str:s.str,wit:s.wit,luck:s.luck};

    let odds="";
    if(lead.stat!=="pay"){
      const need=lead.diff, have=statVal[lead.stat]||5;

      odds=`<span class="gold">costs ${lead.cost} gold · sure thing</span>`;

    h+=`<div class="legendcard">

      <text x="160" y="114" font-size="9" fill="#9a78d0" text-anchor="middle" font-family="Georgia,serif" font-style="italic">older than money, and he has never forgiven a debt</text>`;
  }
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;border-radius:4px;display:block;margin:4px 0">${inner}</svg>`;
}
function viewCombat(){
  const C=TEMP.combat,e=C.e,s=S;
  const intent=INTENT[e.intent];
  const stagPct=e.stagMax?(e.stag/e.stagMax*100):0;
  const intentColor = e.intent==="heavy"?"var(--red)":e.intent==="brace"?"var(--teal)":"var(--gold-bright)";
  const legend=!!e.legend;
  let h=`<div class="panel"${legend?' style="border:2px solid var(--purple);box-shadow:0 0 18px rgba(150,107,208,0.25)"':''}>
    <h2${legend?' style="color:var(--purple)"':''}>${e.name} ${legend?'<span style="color:var(--purple)">· ✦ LEGENDARY ✦</span>':e.monster?'<span class="red">· MONSTER</span>':''}</h2>
    ${legend?bossArt(e.art):''}
    ${bar("ehp",Math.max(0,e.hp),e.maxhp)}
    <div style="display:flex;align-items:center;gap:8px;margin:6px 0"><span class="lbl mono" style="min-width:54px">STAGGER</span>
      <div class="barwrap"><div class="barfill" style="width:${stagPct}%;background:linear-gradient(90deg,#d9a441,#f0c869)"></div><div class="bartxt">${e.stag}/${e.stagMax}</div></div></div>`;
  // the telegraph — the thing the player must read
  if(!C.over){
    h+=`<div style="border:1px solid ${intentColor};border-radius:4px;padding:8px 10px;margin:8px 0;background:#0d0a07">
      <span style="font-size:18px">${intent.icon}</span>
      <span style="color:${intentColor}">The ${e.name} is <strong>${intent.label}</strong>.</span>
      <span class="quiet small">— ${intent.hint}.</span></div>`;
  }
  h+=`<div style="margin-top:6px"><span class="lbl mono">YOU</span>${bar("hp",Math.max(0,s.hp),s.maxhp)}</div>
    <div class="log">${C.log.map(l=>`<div class="${l.c}">${l.t}</div>`).join("")}</div>`;
  if(!C.over){
    h+=`<div class="btnrow">
      <button class="primary" data-act="strike">Strike <span class="cost">solid hit</span></button>
      <button data-act="feint">Feint <span class="cost">breaks guard</span></button>
      <button data-act="guard">Guard <span class="cost">blocks heavy</span></button></div>
    <div class="btnrow">
      <button data-act="item">Heal <span class="cost">+HP</span></button>
      <button data-act="flee">Flee</button></div>
    ${(()=>{ const cons=(s.items||[]).map(id=>itemById(id)).filter(it=>it&&it.use); if(!cons.length)return''; return `<div class="btnrow">`+cons.map(it=>`<button class="danger" data-act="useBattleItem" data-arg="${it.id}">${it.name}</button>`).join('')+`</div>`; })()}
    <p class="cost">Read the telegraph: <span class="red">⚔ heavy</span> → Guard · <span class="teal">🛡 brace</span> → Feint · <span class="gold">↯ jab</span> → Strike. Land the counter to build stagger; a staggered foe loses its turn and takes extra damage.</p>`;
  }
  h+=`</div>`;return h;
}
function viewLevelup(){
  const s=S,avail=PERKS.filter(p=>!s.perks.includes(p.id));
  let h=`<div class="panel"><h2>You Have Grown</h2><p class="narr">Level ${s.level}. Choose a mark to carry forward.</p><div class="btnrow" style="flex-direction:column">`;
  avail.forEach(p=>h+=`<button data-act="pickPerk" data-arg="${p.id}"><span class="gold">${p.name}</span> — <span class="quiet small">${p.desc}</span></button>`);
  h+=`</div></div>`;return h;
}
function viewCodex(){
  const s=S;
  let h=`<div class="panel"><h2>Codex</h2><p class="quiet small">Chronicles ${s.chronicles.length}/${PORTS.length} · Discoveries found across your travels.</p>
    <button data-act="mapView">View the known map</button> <button data-act="backPort">Back</button></div>`;
  PORTS.forEach(p=>{
    if(s.visited[p.id]){
      const ds=(s.foundDiscoveries[p.id]||[]).map(i=>p.discoveries[i]);
      h+=`<div class="chronicle"><div class="tag">${p.name} · ${p.chronicle.title}</div><p class="narr small">${p.chronicle.text}</p>
        <p class="quiet small"><em>${p.myth.name}:</em> ${p.myth.text}</p>
        ${ds.length?`<p class="teal small"><em>Discoveries:</em> ${ds.join(" · ")}</p>`:`<p class="quiet small">No city discoveries yet — explore here.</p>`}</div>`;
    } else if(s.discovered[p.id]){
      h+=`<div class="legendcard small"><span class="teal">${p.name}</span> <span class="quiet">· ${p.region} — known, not yet visited.</span></div>`;
    }
  });
  return h;
}
function viewMap(){
  const s=S;
  const W=560,H=440;
  const cx=p=>(COORDS[p.id].x/100)*W, cy=p=>(COORDS[p.id].y/100)*H;
  // build route lines between discovered neighbours (avoid drawing twice)
  let routes="";
  const drawn={};
  PORTS.forEach(p=>{
    if(!s.discovered[p.id])return;
    p.neighbours.forEach(nid=>{
      if(!s.discovered[nid])return;
      const key=[p.id,nid].sort().join("|"); if(drawn[key])return; drawn[key]=true;
      const a=COORDS[p.id],b=COORDS[nid];
      routes+=`<line x1="${(a.x/100)*W}" y1="${(a.y/100)*H}" x2="${(b.x/100)*W}" y2="${(b.y/100)*H}" stroke="#4a3826" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>`;
    });
  });
  // nodes
  let nodes="";
  PORTS.forEach(p=>{
    const disc=s.discovered[p.id], vis=s.visited[p.id], here=s.port===p.id;
    const x=cx(p), y=cy(p);
    if(!disc){
      // unknown: faint question mark at a vague position
      nodes+=`<g opacity="0.35"><circle cx="${x}" cy="${y}" r="4" fill="none" stroke="#5a4a36" stroke-width="1" stroke-dasharray="2 2"/><text x="${x}" y="${y+3}" text-anchor="middle" font-size="8" fill="#7a6a46">?</text></g>`;
      return;
    }
    const eco=Math.round(s.eco[p.id]||0);
    const col= here? "#f0c869" : vis? "#7da45c" : "#4a9d9d";
    const r= here?7: vis?6:5;
    const conds=portConditions(s,p.id);
    const condIcons=conds.map(c=>CONDITION_TYPES[c.type].icon).join("");
    nodes+=`<g>
      ${here?`<circle cx="${x}" cy="${y}" r="11" fill="none" stroke="#f0c869" stroke-width="1" opacity="0.6"><animate attributeName="r" values="9;13;9" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/></circle>`:''}
      <circle cx="${x}" cy="${y}" r="${r}" fill="${col}" stroke="#1a1410" stroke-width="1.5"/>
      ${vis&&eco>=100?`<circle cx="${x}" cy="${y}" r="${r+2.5}" fill="none" stroke="#d9a441" stroke-width="1"/>`:''}
      <text x="${x+9}" y="${y+3}" font-size="10" fill="#e8ddc4" font-family="Georgia,serif">${p.name}${vis?` <tspan fill="#b8a878" font-size="8">${eco}%</tspan>`:''}</text>
      ${condIcons?`<text x="${x+9}" y="${y+14}" font-size="9">${condIcons}</text>`:''}
    </g>`;
  });
  // war routes drawn in red
  let warLines="";
  activeConditions(s).filter(c=>c.type==="war").forEach(c=>{
    if(s.discovered[c.portA]&&s.discovered[c.portB]){
      const a=COORDS[c.portA],b=COORDS[c.portB];
      warLines+=`<line x1="${(a.x/100)*W}" y1="${(a.y/100)*H}" x2="${(b.x/100)*W}" y2="${(b.y/100)*H}" stroke="#c44a3a" stroke-width="2" opacity="0.7" stroke-dasharray="5 3"/>`;
    }
  });
  // news list
  const conds=activeConditions(s);
  let newsList="";
  if(conds.length){
    newsList=`<div style="margin-top:8px"><span class="lbl mono">WORLD NEWS</span>`;
    conds.forEach(c=>{
      const d=CONDITION_TYPES[c.type];
      let where = c.type==="war" ? `${portById(c.portA).name} ↔ ${portById(c.portB).name}`
                : c.port ? portById(c.port).name
                : c.good ? GOODS[c.good]+" (everywhere)" : "";
      newsList+=`<div class="small" style="color:var(--purple)">${d.icon} ${d.label}: ${where} <span class="quiet">· ${c.until-s.day}d left</span></div>`;
    });
    newsList+=`</div>`;
  } else {
    newsList=`<p class="quiet small" style="margin-top:8px">The world is quiet for now — no wars, booms, or plagues abroad.</p>`;
  }
  // rival leaderboard
  let board="";
  if(s.rivals && s.rivals.length){
    const lb=rivalLeaderboard(s);
    board=`<div style="margin-top:10px"><span class="lbl mono">MERCHANTS OF THE AGE — by fortune</span>`;
    lb.forEach((e,i)=>{
      const rank=i+1;
      const col=e.you?"var(--gold-bright)":"var(--ink)";
      board+=`<div class="small" style="display:flex;justify-content:space-between;color:${col};${e.you?'font-weight:bold':''}">
        <span>${rank}. ${e.name}${e.specLabel?` <span class="quiet">· ${e.specLabel}</span>`:''}</span>
        <span class="gold">${e.gold.toLocaleString()}g</span></div>`;
    });
    board+=`<p class="cost">Out-earn them all by your death to be remembered as <span style="color:var(--purple)">the Unrivalled</span>.</p></div>`;
  }
  let h=`<div class="panel"><h2>The Known World</h2>
    <p class="quiet small">${Object.keys(s.discovered).length}/${PORTS.length} ports discovered · ${Object.keys(s.visited).length} visited. Sail near a port to reveal its neighbours.</p>
    <div style="background:#0d0a07;border:1px solid var(--line);border-radius:3px;padding:6px;overflow-x:auto">
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:420px;display:block">
      <rect x="0" y="0" width="${W}" height="${H}" fill="#11161a" opacity="0.4"/>
      ${routes}${warLines}${nodes}
    </svg></div>
    ${newsList}${board}
    <div style="margin-top:8px">
      <span class="chip" style="border-color:#f0c869;color:#f0c869">● you are here</span>
      <span class="chip" style="border-color:#7da45c;color:#7da45c">● visited</span>
      <span class="chip" style="border-color:#4a9d9d;color:#4a9d9d">● known</span>
      <span class="chip" style="border-color:var(--purple);color:var(--purple)">⚔🔥☠ conditions</span>
    </div>
    <button class="full" data-act="backPort" style="margin-top:10px">Back to port</button></div>`;
  return h;
}
function viewEnd(){
  const s=S,info=TEMP.endinfo,T=info.title;
  let h=`<div class="panel"><h2>The Ledger Closes</h2>
    <p class="narr">${s.name} ${info.cause}, at the age of <span class="gold">${ageYears(s)}</span>.</p>
    <div class="divider">✦ ✦ ✦</div>
    <div class="chronicle" style="text-align:center;border-color:${T.rare?'var(--purple)':'var(--gold)'}">
      <div class="tag" style="${T.rare?'color:var(--purple)':''}">${T.rare?'✦ RARE TITLE — a feat few achieve ✦':'Your Title, Earned This Life'}</div>
      <p class="narr" style="font-size:20px;color:${T.rare?'var(--purple)':'var(--gold-bright)'};margin:6px 0">${T.full}</p>
      <p class="quiet small">${T.summary}</p>
    </div>
    <p class="narr small quiet">Honours collected:</p>`;
  info.legends.forEach(l=>h+=`<div class="legendcard"><span class="nm" style="font-size:16px">${l}</span></div>`);
  h+=`<p class="quiet small" style="margin-top:10px">Peak wealth ${s.peakGold}g · ${Object.keys(s.visited).length} ports visited · ${s.chronicles.length}/${PORTS.length} chronicles · ${s.fights} fights${s.debtCleared?' · debt cleared ✓':''}</p>
    <div class="divider">✦</div><button class="primary full" data-act="toTitle">Carve the Name &amp; Begin Again</button></div>`;
  return h;
}

/* ===================================================================
   DISPATCH
   =================================================================== */
const ACTIONS={
  goCreate:()=>{TEMP={bias:null,name:""};SCREEN="create";render();},
  setBias:id=>{const n=document.getElementById("pname");if(n)TEMP.name=n.value;TEMP.bias=id;render();},
  startGame:()=>{const n=document.getElementById("pname");const name=(n&&n.value.trim())||"Nameless Trader";S=newState(name,TEMP.bias);S.rivals=makeRivals(S);revealNeighbours(S,"alexandria");S.openingEra=seedOpeningEra(S);TEMP={};SCREEN="briefing";render();},
  dismissBriefing:()=>{S.briefed=true;S.tab="market";SCREEN="port";render();},
  tab:id=>{S.tab=id;SCREEN="port";render();},
  openGood:g=>confirmTrade(g,"buy"),
  openSell:g=>confirmTrade(g,"sell"),
  qtyPlus:()=>tradeQty(1), qtyMinus:()=>tradeQty(-1), qtyMax:()=>tradeQtyMax(),
  haggle:()=>tradeHaggle(), execTrade:()=>executeTrade(),
  cancelTrade:()=>{TEMP.trade=null;SCREEN="port";S.tab="market";render();},
  explore:()=>explore(), pursueLead:i=>pursueLead(+i),
  library:()=>readLibrary(), backCity:()=>{S.tab="city";SCREEN="port";render();},
  dismissEvent:()=>{TEMP.worldEvent=null;S.tab="sail";SCREEN="port";render();},
  dismissNews:()=>{TEMP.worldNews=null;S.tab="sail";SCREEN="port";render();},
  spar:()=>trainSpar(), pray:()=>prayTemple(),
  fund:()=>fundCity(), payDebt:()=>payDebt(),
  openBank:()=>{TEMP.bankConfirm=null;SCREEN="bank";render();},
  openShop:()=>{SCREEN="shop";render();},
  buyItem:id=>buyItem(id), sellItem:id=>sellItem(id), buyPrestige:()=>buyPrestige(),
  borrow:a=>borrow(+a), repayLoan:a=>repayLoan(+a), depositGold:a=>depositGold(+a), withdrawGold:a=>withdrawGold(+a),
  bankAsk:(a)=>{ const [op,amt]=String(a).split(":"); TEMP.bankConfirm={op,amt:+amt}; render(); },
  bankCancel:()=>{ TEMP.bankConfirm=null; render(); },
  bankDo:()=>{ const c=TEMP.bankConfirm; TEMP.bankConfirm=null; if(!c)return;
    if(c.op==="borrow")borrow(c.amt); else if(c.op==="repay")repayLoan(c.amt); else if(c.op==="deposit")depositGold(c.amt); else if(c.op==="withdraw")withdrawGold(c.amt); },
  repayDue:a=>{ repayLoan(+a); TEMP.bankDue=null; if(S.loan<=0){ S.inDefault=false; } if(TEMP.pendingArrive){ TEMP.pendingArrive=false; SCREEN="arrive"; } else { SCREEN="port"; S.tab="harbour"; } render(); },
  delayDue:()=>{ S.inDefault=true; S.missedMonths=(S.missedMonths||0)+1; TEMP.bankDue=null; const msg=S.missedMonths>=4?"You refuse again. The banking house's patience is gone — they will take what they are owed.":"You turn the collectors away — for now. They'll be back, and angrier."; if(TEMP.pendingArrive){ TEMP.pendingArrive=false; SCREEN="arrive"; } else { SCREEN="port"; S.tab="harbour"; } TEMP.flash=msg; render(); setTimeout(()=>{TEMP.flash=null;},1600); },
  dismissSeize:()=>{ TEMP.seize=null; SCREEN="port"; S.tab="harbour"; render(); },
  investEco:a=>investEco(+a),
  useBattleItem:id=>useBattleItem(id),
  lacunaPay:()=>{ const s=S; if(s.gold>=s.lacunaDebt){ s.gold-=s.lacunaDebt; s.lacunaDebt=0; winGame("in gold"); } },
  lacunaFight:()=>{ startCombat(JSON.parse(JSON.stringify(LACUNA_LORD)),{returnTo:"lacunaResolve"}); },
  lacunaPaidOff:()=>{ winGame("in instalments of blood"); },
  sleep:()=>doSleep(),
  shipyard:()=>{SCREEN="shipyard";render();}, buyShip:id=>buyShip(id), upgradeShip:()=>upgradeShip(), backPort:()=>{SCREEN="port";render();},
  codex:()=>{SCREEN="codex";render();}, mapView:()=>{SCREEN="map";render();},
  sail:id=>{if(checkOldAge())return;travelTo(id);},
  resolveTravel:()=>resolveTravel(),
  enterPort:()=>{TEMP.arrived=null;S.tab="market";SCREEN="port";
    if(checkOldAge())return;
    if(S.inDefault && S.loan>0 && !S._collectorsThisStop){
      S._collectorsThisStop=true;
      if((S.missedMonths||0)>=6){
        // the bank stops fighting and simply seizes what it's owed — no battle to win
        const r=bankSeize(S);
        TEMP.seize=r; SCREEN="seize"; render(); return;
      }
      startCombat(makeCollectors(S),{returnTo:"port"});
      return;
    }
    render();},
  strike:()=>playerStrike(),feint:()=>playerFeint(),guard:()=>playerGuard(),item:()=>playerItem(),flee:()=>playerFlee(),
  pickPerk:id=>{S.perks.push(id);TEMP.pendingPerk=false;const C=TEMP.combat;if(C){afterCombat(C);}else{SCREEN="port";render();}},
  toTitle:()=>{TEMP={savedRun:null};SCREEN="title";render();},
  continueGame:()=>{ const d=TEMP.savedRun; if(d&&d.s){ S=d.s; SCREEN=d.screen||"port"; S.tab=d.tab||S.tab||"market"; TEMP={}; render(); } },
  abandonRun:()=>{ clearSave(); TEMP.savedRun=null; TEMP.bias=null; SCREEN="create"; render(); }
};

(async function(){ await loadLegends(); TEMP.savedRun = await loadGame(); SCREEN="title"; render(); })();
</script>
